name: Deploy AWS Branch Fleet vK8s

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  PROJECT_PREFIX: ${{ vars.PROJECT_PREFIX }}
  XC_NAMESPACE: ${{ vars.XC_NAMESPACE }}
  XC_SERVICE_CREDENTIAL_ROLE: ${{ vars.XC_SERVICE_CREDENTIAL_ROLE }}
  BRANCH_VK8S_NAMESPACE: ${{ vars.BRANCH_VK8S_NAMESPACE }}
  BRANCH_VK8S_VIRTUAL_SITE_NAME: ${{ vars.BRANCH_VK8S_VIRTUAL_SITE_NAME }}
  BRANCH_VK8S_NAME: ${{ vars.BRANCH_VK8S_NAME }}
  BRANCH_VK8S_SELECTOR_EXPRESSION: ${{ vars.BRANCH_VK8S_SELECTOR_EXPRESSION }}

jobs:
  deploy_branch_vk8s:
    name: Create branch fleet vK8s
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      VES_P12_PASSWORD: ${{ secrets.XC_P12_PASSWORD }}
      TF_VAR_xc_api_url: ${{ secrets.XC_API_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Validate workflow configuration
        shell: bash
        run: |
          set -euo pipefail
          for name in PROJECT_PREFIX XC_NAMESPACE; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required repository variable: ${name}."
              exit 1
            fi
          done

          if [[ -z '${{ secrets.TF_API_TOKEN }}' ]]; then
            echo '::error::Missing required repository secret: TF_API_TOKEN.'
            exit 1
          fi
          if [[ -z '${{ secrets.TF_CLOUD_ORGANIZATION }}' ]]; then
            echo '::error::Missing required repository secret: TF_CLOUD_ORGANIZATION.'
            exit 1
          fi
          if [[ -z '${{ secrets.XC_API_URL }}' ]]; then
            echo '::error::Missing required repository secret: XC_API_URL.'
            exit 1
          fi
          if [[ -z '${{ secrets.XC_API_P12_FILE }}' ]]; then
            echo '::error::Missing required repository secret: XC_API_P12_FILE.'
            exit 1
          fi
          if [[ -z '${{ secrets.XC_P12_PASSWORD }}' ]]; then
            echo '::error::Missing required repository secret: XC_P12_PASSWORD.'
            exit 1
          fi

      - name: Normalize branch fleet settings
        shell: bash
        run: |
          set -euo pipefail
          branch_vk8s_namespace="${BRANCH_VK8S_NAMESPACE:-buytime-branches}"
          branch_vk8s_namespace="${branch_vk8s_namespace// /-}"
          branch_vk8s_namespace="${branch_vk8s_namespace#-}"
          branch_vk8s_namespace="${branch_vk8s_namespace%-}"

          branch_virtual_site_name="${BRANCH_VK8S_VIRTUAL_SITE_NAME:-buytime-branch-sites}"
          branch_vk8s_name="${BRANCH_VK8S_NAME:-buytime-branches-vk8s}"
          branch_selector_expression="${BRANCH_VK8S_SELECTOR_EXPRESSION:-site_group in (buytime-branches)}"

          raw="${PROJECT_PREFIX}-${XC_NAMESPACE}"
          workspace_prefix="$(printf '%s' "$raw" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9-' '-')"
          workspace_prefix="${workspace_prefix#-}"
          workspace_prefix="${workspace_prefix%-}"
          if [[ -z "$workspace_prefix" ]]; then
            workspace_prefix="xcawsedgedemo"
          fi

          api_credential_name="bfvk-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          {
            echo "BRANCH_FLEET_NAMESPACE=${branch_vk8s_namespace}"
            echo "BRANCH_FLEET_VIRTUAL_SITE_NAME=${branch_virtual_site_name}"
            echo "BRANCH_FLEET_VK8S_NAME=${branch_vk8s_name}"
            echo "BRANCH_FLEET_SELECTOR_EXPRESSION=${branch_selector_expression}"
            echo "BRANCH_FLEET_WORKSPACE=${workspace_prefix}-branch-vk8s"
            echo "BRANCH_FLEET_API_CREDENTIAL_NAME=${api_credential_name}"
            echo "TF_VAR_environment=${branch_vk8s_namespace}"
            echo "TF_VAR_virtual_site_name=${branch_virtual_site_name}"
            echo "TF_VAR_virtual_k8s_name=${branch_vk8s_name}"
            echo "TF_VAR_branch_site_selector_expression=${branch_selector_expression}"
            echo "TF_VAR_api_credential_name=${api_credential_name}"
            echo "TF_VAR_kubeconfig_path=$RUNNER_TEMP/branch-fleet-vk8s-kubeconfig.yaml"
            echo "TF_VAR_create_api_credential=true"
          } >> "$GITHUB_ENV"

      - name: Decode XC API credential
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' '${{ secrets.XC_API_P12_FILE }}' | base64 --decode > "$RUNNER_TEMP/xc-api-creds.p12"
          echo "TF_VAR_xc_api_p12_file=$RUNNER_TEMP/xc-api-creds.p12" >> "$GITHUB_ENV"

      - name: Validate XC API client certificate
        shell: bash
        run: |
          set -euo pipefail
          openssl pkcs12 \
            -in "$RUNNER_TEMP/xc-api-creds.p12" \
            -clcerts \
            -legacy \
            -nokeys \
            -passin env:VES_P12_PASSWORD \
            -out "$RUNNER_TEMP/xc-api-cert.pem"
          openssl pkcs12 \
            -in "$RUNNER_TEMP/xc-api-creds.p12" \
            -legacy \
            -nocerts \
            -nodes \
            -passin env:VES_P12_PASSWORD \
            -out "$RUNNER_TEMP/xc-api-key.pem"
          end_date="$(openssl x509 -in "$RUNNER_TEMP/xc-api-cert.pem" -noout -enddate | cut -d= -f2-)"
          if ! openssl x509 -in "$RUNNER_TEMP/xc-api-cert.pem" -checkend 0 -noout; then
            echo "::error::XC API client certificate is expired. notAfter=${end_date}. Rotate the certificate in F5 XC and update secrets XC_API_P12_FILE and XC_P12_PASSWORD."
            exit 1
          fi

      - name: Terraform init branch fleet module
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/branch-vk8s.backend.hcl" <<EOF
          organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
          workspaces {
            name = "${BRANCH_FLEET_WORKSPACE}"
          }
          EOF
          terraform -chdir=aws-mk8s-vk8s/branch-vk8s init \
            -backend-config="$RUNNER_TEMP/branch-vk8s.backend.hcl"

      - name: Detect existing branch fleet namespace
        shell: bash
        run: |
          set -euo pipefail
          api_url='${{ secrets.XC_API_URL }}'
          api_root="${api_url%/}"
          api_root="${api_root%/api}"
          namespace_endpoint="${api_root}/api/web/namespaces/${BRANCH_FLEET_NAMESPACE}"
          http_code="$(curl \
            --silent \
            --show-error \
            --output "$RUNNER_TEMP/branch-fleet-namespace.json" \
            --write-out '%{http_code}' \
            --cert "$RUNNER_TEMP/xc-api-cert.pem" \
            --key "$RUNNER_TEMP/xc-api-key.pem" \
            "$namespace_endpoint" || true)"

          case "$http_code" in
            200)
              echo "TF_VAR_create_namespace=false" >> "$GITHUB_ENV"
              echo "Namespace ${BRANCH_FLEET_NAMESPACE} already exists in XC; branch fleet workflow will reuse it."
              ;;
            404)
              echo "TF_VAR_create_namespace=true" >> "$GITHUB_ENV"
              echo "Namespace ${BRANCH_FLEET_NAMESPACE} does not exist in XC yet; branch fleet workflow will create it."
              ;;
            *)
              echo "::error::Unable to determine whether namespace ${BRANCH_FLEET_NAMESPACE} exists in XC (HTTP ${http_code:-curl-error})."
              [[ -s "$RUNNER_TEMP/branch-fleet-namespace.json" ]] && cat "$RUNNER_TEMP/branch-fleet-namespace.json"
              exit 1
              ;;
          esac

      - name: Detect existing branch fleet virtual site
        shell: bash
        run: |
          set -euo pipefail
          api_url='${{ secrets.XC_API_URL }}'
          api_root="${api_url%/}"
          api_root="${api_root%/api}"
          endpoint="${api_root}/api/config/namespaces/${BRANCH_FLEET_NAMESPACE}/virtual_sites/${BRANCH_FLEET_VIRTUAL_SITE_NAME}"
          http_code="$(curl \
            --silent \
            --show-error \
            --output "$RUNNER_TEMP/branch-fleet-virtual-site.json" \
            --write-out '%{http_code}' \
            --cert "$RUNNER_TEMP/xc-api-cert.pem" \
            --key "$RUNNER_TEMP/xc-api-key.pem" \
            "$endpoint" || true)"

          case "$http_code" in
            200)
              echo "TF_VAR_create_virtual_site=false" >> "$GITHUB_ENV"
              echo "Virtual site ${BRANCH_FLEET_VIRTUAL_SITE_NAME} already exists in XC; branch fleet workflow will reuse it."
              ;;
            404)
              echo "TF_VAR_create_virtual_site=true" >> "$GITHUB_ENV"
              echo "Virtual site ${BRANCH_FLEET_VIRTUAL_SITE_NAME} does not exist in XC yet; branch fleet workflow will create it."
              ;;
            *)
              echo "::error::Unable to determine whether virtual site ${BRANCH_FLEET_VIRTUAL_SITE_NAME} exists in XC (HTTP ${http_code:-curl-error})."
              [[ -s "$RUNNER_TEMP/branch-fleet-virtual-site.json" ]] && cat "$RUNNER_TEMP/branch-fleet-virtual-site.json"
              exit 1
              ;;
          esac

      - name: Detect existing branch fleet virtual k8s
        shell: bash
        run: |
          set -euo pipefail
          api_url='${{ secrets.XC_API_URL }}'
          api_root="${api_url%/}"
          api_root="${api_root%/api}"
          endpoint="${api_root}/api/config/namespaces/${BRANCH_FLEET_NAMESPACE}/virtual_k8ss/${BRANCH_FLEET_VK8S_NAME}"
          http_code="$(curl \
            --silent \
            --show-error \
            --output "$RUNNER_TEMP/branch-fleet-vk8s.json" \
            --write-out '%{http_code}' \
            --cert "$RUNNER_TEMP/xc-api-cert.pem" \
            --key "$RUNNER_TEMP/xc-api-key.pem" \
            "$endpoint" || true)"

          case "$http_code" in
            200)
              echo "TF_VAR_create_virtual_k8s=false" >> "$GITHUB_ENV"
              echo "Virtual k8s ${BRANCH_FLEET_VK8S_NAME} already exists in XC; branch fleet workflow will reuse it."
              ;;
            404)
              echo "TF_VAR_create_virtual_k8s=true" >> "$GITHUB_ENV"
              echo "Virtual k8s ${BRANCH_FLEET_VK8S_NAME} does not exist in XC yet; branch fleet workflow will create it."
              ;;
            *)
              echo "::error::Unable to determine whether virtual k8s ${BRANCH_FLEET_VK8S_NAME} exists in XC (HTTP ${http_code:-curl-error})."
              [[ -s "$RUNNER_TEMP/branch-fleet-vk8s.json" ]] && cat "$RUNNER_TEMP/branch-fleet-vk8s.json"
              exit 1
              ;;
          esac

      - name: Terraform apply branch fleet vK8s
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=aws-mk8s-vk8s/branch-vk8s apply -auto-approve

      - name: Wait for branch fleet vK8s API readiness
        shell: bash
        run: |
          set -euo pipefail
          kubeconfig_path="$RUNNER_TEMP/branch-fleet-vk8s-kubeconfig.yaml"
          attempts=40
          sleep_seconds=15
          version_log="$RUNNER_TEMP/branch-fleet-vk8s-version.log"
          namespace_log="$RUNNER_TEMP/branch-fleet-vk8s-namespace.log"

          for attempt in $(seq 1 "$attempts"); do
            if kubectl --kubeconfig "$kubeconfig_path" --request-timeout=10s version >"$version_log" 2>&1 && \
              kubectl --kubeconfig "$kubeconfig_path" --request-timeout=10s get namespace "${BRANCH_FLEET_NAMESPACE}" -o name >"$namespace_log" 2>&1; then
              cat "$version_log"
              cat "$namespace_log"
              exit 0
            fi

            echo "Branch fleet vK8s API not ready yet (attempt ${attempt}/${attempts}); waiting ${sleep_seconds}s"
            [[ -s "$version_log" ]] && tail -n 5 "$version_log"
            [[ -s "$namespace_log" ]] && tail -n 5 "$namespace_log"
            sleep "$sleep_seconds"
          done

          echo "::error::Timed out waiting for the branch fleet vK8s API to become ready."
          kubectl --kubeconfig "$kubeconfig_path" --request-timeout=10s version || true
          kubectl --kubeconfig "$kubeconfig_path" --request-timeout=10s get namespace "${BRANCH_FLEET_NAMESPACE}" -o name || true
          exit 1

      - name: Write branch fleet deployment summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Branch Fleet vK8s Summary"
            echo
            echo "- Namespace: ${BRANCH_FLEET_NAMESPACE}"
            echo "- Virtual site: ${BRANCH_FLEET_VIRTUAL_SITE_NAME}"
            echo "- Virtual k8s: ${BRANCH_FLEET_VK8S_NAME}"
            echo "- Selector expression: ${BRANCH_FLEET_SELECTOR_EXPRESSION}"
            echo "- Workspace: ${BRANCH_FLEET_WORKSPACE}"
            echo "- Kubeconfig generated: $(if [[ -s "$RUNNER_TEMP/branch-fleet-vk8s-kubeconfig.yaml" ]]; then echo yes; else echo no; fi)"
            echo
            echo "### Notes"
            echo
            echo "- This workflow does not modify existing branch provisioning workflows."
            echo "- The virtual site will only attach branch sites that match the selector expression above."
            echo "- If branch sites are not labeled yet, the vK8s can exist before any branch joins it."
          } >> "$GITHUB_STEP_SUMMARY"