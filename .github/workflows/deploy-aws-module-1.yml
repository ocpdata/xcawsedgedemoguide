name: Deploy AWS Staged Modules

on:
  workflow_dispatch:
    inputs:
      deployment_stage:
        description: Select which stage to execute in this workflow.
        required: true
        default: module-1
        type: choice
        options:
          - module-1
          - module-2
          - module-3

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  DEPLOYMENT_STAGE: ${{ inputs.deployment_stage }}
  MODULE2_ENVIRONMENT: buytime-online
  MODULE3_ENVIRONMENT: buytime-online
  MODULE2_SYNC_DOMAIN: inventory-server.branches.buytime.internal
  MODULE2_SYNC_PORT: "3000"
  USER_DOMAIN: ${{ vars.USER_DOMAIN }}
  MODULE3_DEALS_DOMAIN: deals.${{ vars.USER_DOMAIN }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  PROJECT_PREFIX: ${{ vars.PROJECT_PREFIX }}
  VPC_CIDR_MK8S: ${{ vars.VPC_CIDR_MK8S }}
  VPC_CIDR_CE: ${{ vars.VPC_CIDR_CE }}
  XC_NAMESPACE: ${{ vars.XC_NAMESPACE }}
  XC_SERVICE_CREDENTIAL_ROLE: ${{ vars.XC_SERVICE_CREDENTIAL_ROLE }}
  CE_SITE_NAME: ${{ vars.CE_SITE_NAME }}

jobs:
  prerequisites:
    name: Apply prerequisites
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: ${{ inputs.deployment_stage == 'module-1' }}
    outputs:
      app_stack_name: ${{ steps.collect.outputs.app_stack_name }}
      mk8s_cluster_name: ${{ steps.collect.outputs.mk8s_cluster_name }}
      xc_namespace: ${{ steps.collect.outputs.xc_namespace }}
      appstack_private_ip: ${{ steps.collect.outputs.appstack_private_ip }}
      kiosk_address: ${{ steps.collect.outputs.kiosk_address }}
      kiosk_user: ${{ steps.collect.outputs.kiosk_user }}
      workspace_prefix: ${{ steps.naming.outputs.workspace_prefix }}
    env:
      VES_P12_PASSWORD: ${{ secrets.XC_P12_PASSWORD }}
      TF_VAR_project_prefix: ${{ vars.PROJECT_PREFIX }}
      TF_VAR_xc_namespace: ${{ vars.XC_NAMESPACE }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_vpc_cidr: ${{ vars.VPC_CIDR_MK8S }}
      TF_VAR_existing_mk8s_cluster_name: ${{ vars.EXISTING_MK8S_CLUSTER_NAME }}
      TF_VAR_windows_admin_password: ${{ vars.PASSWORD_VM_WINDOWS }}
      TF_VAR_aws_access_key: ${{ secrets.AWS_ACCESS_KEY }}
      TF_VAR_aws_secret_key: ${{ secrets.AWS_SECRET_KEY }}
      TF_VAR_xc_api_url: ${{ secrets.XC_API_URL }}
      TF_VAR_create_origin_pool: "true"
      TF_VAR_create_tcp_loadbalancer: "true"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Validate workflow configuration
        shell: bash
        run: |
          set -euo pipefail
          for name in AWS_REGION PROJECT_PREFIX VPC_CIDR_MK8S XC_NAMESPACE; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required repository variable: ${name}."
              exit 1
            fi
          done
          python3 - <<'PY'
          import ipaddress
          import os
          import sys

          cidr = os.environ["VPC_CIDR_MK8S"]
          try:
              ipaddress.ip_network(cidr, strict=False)
          except Exception as exc:
              print(f"::error::VPC_CIDR_MK8S must be a valid CIDR block. Received {cidr!r}: {exc}")
              sys.exit(1)
          PY

      - name: Compute workspace names
        id: naming
        shell: bash
        run: |
          set -euo pipefail
          raw="${PROJECT_PREFIX}-${XC_NAMESPACE}"
          workspace_prefix="$(printf '%s' "$raw" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9-' '-')"
          workspace_prefix="${workspace_prefix#-}"
          workspace_prefix="${workspace_prefix%-}"
          if [[ -z "$workspace_prefix" ]]; then
            workspace_prefix="xcawsedgedemo"
          fi
          echo "workspace_prefix=$workspace_prefix" >> "$GITHUB_OUTPUT"
          echo "PREREQUISITES_WORKSPACE=${workspace_prefix}-prerequisites" >> "$GITHUB_ENV"
          echo "MODULE1_WORKSPACE=${workspace_prefix}-module-1" >> "$GITHUB_ENV"

      - name: Decode XC API credential
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' '${{ secrets.XC_API_P12_FILE }}' | base64 --decode > "$RUNNER_TEMP/xc-api-creds.p12"
          echo "TF_VAR_xc_api_p12_file=$RUNNER_TEMP/xc-api-creds.p12" >> "$GITHUB_ENV"

      - name: Validate XC API client certificate
        shell: bash
        run: |
          set -euo pipefail
          openssl pkcs12 \
            -in "$RUNNER_TEMP/xc-api-creds.p12" \
            -clcerts \
            -legacy \
            -nokeys \
            -passin env:VES_P12_PASSWORD \
            -out "$RUNNER_TEMP/xc-api-cert.pem"
          openssl pkcs12 \
            -in "$RUNNER_TEMP/xc-api-creds.p12" \
            -legacy \
            -nocerts \
            -nodes \
            -passin env:VES_P12_PASSWORD \
            -out "$RUNNER_TEMP/xc-api-key.pem"
          end_date="$(openssl x509 -in "$RUNNER_TEMP/xc-api-cert.pem" -noout -enddate | cut -d= -f2-)"
          if ! openssl x509 -in "$RUNNER_TEMP/xc-api-cert.pem" -checkend 0 -noout; then
            echo "::error::XC API client certificate is expired. notAfter=${end_date}. Rotate the certificate in F5 XC and update secrets XC_API_P12_FILE and XC_P12_PASSWORD."
            exit 1
          fi

      - name: Detect XC namespace state
        shell: bash
        run: |
          set -euo pipefail
          api_url='${{ secrets.XC_API_URL }}'
          api_root="${api_url%/}"
          api_root="${api_root%/api}"
          namespace_endpoint="${api_root}/api/web/namespaces/${XC_NAMESPACE}"
          http_code="$(curl \
            --silent \
            --show-error \
            --output "$RUNNER_TEMP/prerequisites-namespace.json" \
            --write-out '%{http_code}' \
            --cert "$RUNNER_TEMP/xc-api-cert.pem" \
            --key "$RUNNER_TEMP/xc-api-key.pem" \
            "$namespace_endpoint" || true)"

          case "$http_code" in
            200)
              echo "TF_VAR_create_xc_namespace=false" >> "$GITHUB_ENV"
              echo "Namespace ${XC_NAMESPACE} already exists in XC; prerequisites will reuse it."
              ;;
            404)
              echo "TF_VAR_create_xc_namespace=true" >> "$GITHUB_ENV"
              echo "Namespace ${XC_NAMESPACE} does not exist in XC yet; prerequisites will create it."
              ;;
            *)
              echo "::error::Unable to determine whether namespace ${XC_NAMESPACE} exists in XC (HTTP ${http_code:-curl-error})."
              if [[ -s "$RUNNER_TEMP/prerequisites-namespace.json" ]]; then
                cat "$RUNNER_TEMP/prerequisites-namespace.json"
              fi
              exit 1
              ;;
          esac

      - name: Terraform init prerequisites
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/prerequisites.backend.hcl" <<EOF
          organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
          workspaces {
            name = "${PREREQUISITES_WORKSPACE}"
          }
          EOF
          terraform -chdir=aws-mk8s-vk8s/prerequisites init \
            -backend-config="$RUNNER_TEMP/prerequisites.backend.hcl"

      - name: Terraform apply prerequisites
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=aws-mk8s-vk8s/prerequisites apply -auto-approve

      - name: Collect prerequisite outputs
        id: collect
        shell: bash
        run: |
          set -euo pipefail
          echo "app_stack_name=$(terraform -chdir=aws-mk8s-vk8s/prerequisites output -raw app_stack_name)" >> "$GITHUB_OUTPUT"
          echo "mk8s_cluster_name=$(terraform -chdir=aws-mk8s-vk8s/prerequisites output -raw mk8s_cluster_name)" >> "$GITHUB_OUTPUT"
          echo "xc_namespace=$(terraform -chdir=aws-mk8s-vk8s/prerequisites output -raw xc_namespace)" >> "$GITHUB_OUTPUT"
          echo "appstack_private_ip=$(terraform -chdir=aws-mk8s-vk8s/prerequisites output -raw appstack_private_ip)" >> "$GITHUB_OUTPUT"
          echo "kiosk_address=$(terraform -chdir=aws-mk8s-vk8s/prerequisites output -raw kiosk_address)" >> "$GITHUB_OUTPUT"
          echo "kiosk_user=$(terraform -chdir=aws-mk8s-vk8s/prerequisites output -raw kiosk_user)" >> "$GITHUB_OUTPUT"

  module_1:
    name: Apply module 1
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: ${{ inputs.deployment_stage == 'module-1' }}
    needs: prerequisites
    env:
      VES_P12_PASSWORD: ${{ secrets.XC_P12_PASSWORD }}
      TF_VAR_project_prefix: ${{ vars.PROJECT_PREFIX }}
      TF_VAR_xc_namespace: ${{ needs.prerequisites.outputs.xc_namespace }}
      TF_VAR_xc_api_url: ${{ secrets.XC_API_URL }}
      TF_VAR_app_stack_name: ${{ needs.prerequisites.outputs.app_stack_name }}
      RECOMMENDATIONS_ORIGIN_DNS: ${{ vars.RECOMMENDATIONS_ORIGIN_DNS }}
      RECOMMENDATIONS_ORIGIN_PORT: ${{ vars.RECOMMENDATIONS_ORIGIN_PORT }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Restore workspace names
        shell: bash
        run: |
          set -euo pipefail
          workspace_prefix='${{ needs.prerequisites.outputs.workspace_prefix }}'
          echo "MODULE1_WORKSPACE=${workspace_prefix}-module-1" >> "$GITHUB_ENV"

      - name: Normalize recommendations origin settings
        shell: bash
        run: |
          set -euo pipefail
          origin_dns="${RECOMMENDATIONS_ORIGIN_DNS:-recommendations.buytime.sr.f5-cloud-demo.com}"
          origin_port="${RECOMMENDATIONS_ORIGIN_PORT:-443}"
          echo "RECOMMENDATIONS_ORIGIN_DNS=${origin_dns}" >> "$GITHUB_ENV"
          echo "RECOMMENDATIONS_ORIGIN_PORT=${origin_port}" >> "$GITHUB_ENV"
          echo "TF_VAR_recommendations_origin_dns=${origin_dns}" >> "$GITHUB_ENV"
          echo "TF_VAR_recommendations_origin_port=${origin_port}" >> "$GITHUB_ENV"

      - name: Decode XC API credential
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' '${{ secrets.XC_API_P12_FILE }}' | base64 --decode > "$RUNNER_TEMP/xc-api-creds.p12"
          echo "TF_VAR_xc_api_p12_file=$RUNNER_TEMP/xc-api-creds.p12" >> "$GITHUB_ENV"

      - name: Validate XC API client certificate
        shell: bash
        run: |
          set -euo pipefail
          openssl pkcs12 \
            -in "$RUNNER_TEMP/xc-api-creds.p12" \
            -clcerts \
            -legacy \
            -nokeys \
            -passin env:VES_P12_PASSWORD \
            -out "$RUNNER_TEMP/xc-api-cert.pem"
          openssl pkcs12 \
            -in "$RUNNER_TEMP/xc-api-creds.p12" \
            -legacy \
            -nocerts \
            -nodes \
            -passin env:VES_P12_PASSWORD \
            -out "$RUNNER_TEMP/xc-api-key.pem"
          end_date="$(openssl x509 -in "$RUNNER_TEMP/xc-api-cert.pem" -noout -enddate | cut -d= -f2-)"
          if ! openssl x509 -in "$RUNNER_TEMP/xc-api-cert.pem" -checkend 0 -noout; then
            echo "::error::XC API client certificate is expired. notAfter=${end_date}. Rotate the certificate in F5 XC and update secrets XC_API_P12_FILE and XC_P12_PASSWORD."
            exit 1
          fi

      - name: Wait for XC application namespace availability
        shell: bash
        run: |
          set -euo pipefail
          api_url='${{ secrets.XC_API_URL }}'
          api_root="${api_url%/}"
          api_root="${api_root%/api}"
          namespace='${{ needs.prerequisites.outputs.xc_namespace }}'
          namespace_endpoint="${api_root}/api/web/namespaces/${namespace}"
          attempts=30
          sleep_seconds=10

          for attempt in $(seq 1 "$attempts"); do
            http_code="$(curl \
              --silent \
              --show-error \
              --output "$RUNNER_TEMP/module-1-namespace.json" \
              --write-out '%{http_code}' \
              --cert "$RUNNER_TEMP/xc-api-cert.pem" \
              --key "$RUNNER_TEMP/xc-api-key.pem" \
              "$namespace_endpoint" || true)"

            case "$http_code" in
              200)
                echo "XC namespace ${namespace} is available."
                exit 0
                ;;
              404)
                ;;
              *)
                echo "::error::Unable to confirm XC namespace ${namespace} availability (HTTP ${http_code:-curl-error})."
                if [[ -s "$RUNNER_TEMP/module-1-namespace.json" ]]; then
                  cat "$RUNNER_TEMP/module-1-namespace.json"
                fi
                exit 1
                ;;
            esac

            if [[ "$attempt" -lt "$attempts" ]]; then
              echo "XC namespace ${namespace} not visible yet (attempt ${attempt}/${attempts}); waiting ${sleep_seconds}s"
              sleep "$sleep_seconds"
            fi
          done

          echo "::error::Timed out waiting for XC namespace ${namespace} to become available."
          if [[ -s "$RUNNER_TEMP/module-1-namespace.json" ]]; then
            cat "$RUNNER_TEMP/module-1-namespace.json"
          fi
          exit 1

      - name: Check XC App Stack site status
        shell: bash
        run: |
          set -euo pipefail
          api_url='${{ secrets.XC_API_URL }}'
          api_root="${api_url%/}"
          api_root="${api_root%/api}"
          site_name='${{ needs.prerequisites.outputs.app_stack_name }}'
          site_endpoint="${api_root}/api/config/namespaces/system/sites/${site_name}?response_format=GET_RSP_FORMAT_STATUS"
          response_file="$RUNNER_TEMP/site-status.json"

          http_code="$(curl \
            --silent \
            --show-error \
            --output "$response_file" \
            --write-out '%{http_code}' \
            --cert "$RUNNER_TEMP/xc-api-cert.pem" \
            --key "$RUNNER_TEMP/xc-api-key.pem" \
            "$site_endpoint" || true)"

          if [[ "$http_code" != "200" ]]; then
            echo "Unable to read XC site status before kubeconfig generation (HTTP ${http_code:-curl-error}). Proceeding to mK8s readiness checks."
            [[ -s "$response_file" ]] && cat "$response_file"
            exit 0
          fi

          site_state="$(jq -r '[.spec?.site_state, .replace_form?.spec?.site_state, .site_state, .status[]?.site_state] | map(select(. != null and . != "")) | first // ""' "$response_file")"
          operational_status="$(jq -r '[.status[]?.conditions[]? | select(.type == "Operational") | .status] | map(select(. != null and . != "")) | first // ""' "$response_file")"
          status_summary="$(jq -r '[.status[]?.conditions[]? | select(.type != null and .status != null) | "\(.type)=\(.status)" , (.status[]?.site_state // empty), .spec?.site_state, .replace_form?.spec?.site_state] | map(select(. != null and . != "")) | unique | join(" | ")' "$response_file")"
          if [[ -z "$status_summary" || "$status_summary" == "null" ]]; then
            status_summary="no detailed status"
          fi

          echo "XC site state: ${site_state:-unknown}"
          echo "XC site operational status: ${operational_status:-unknown}"
          echo "XC site details: ${status_summary}"

          case "$site_state" in
            FAILED|FAILED_INACTIVE|ERROR_IN_ORCHESTRATION|VALIDATION_FAILED|ERROR_DELETING_CLOUD_RESOURCES|ERROR_UPDATING_CLOUD_RESOURCES)
              echo "::error::XC site entered a terminal state: ${site_state}."
              cat "$response_file"
              exit 1
              ;;
          esac

      - name: Terraform init kubeconfig helper
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=aws-mk8s-vk8s/kubeconfig init

      - name: Generate site kubeconfig
        id: kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          prefix_part="$(printf '%s' "$PROJECT_PREFIX" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9-' '-' | cut -c1-12)"
          prefix_part="${prefix_part#-}"
          prefix_part="${prefix_part%-}"
          if [[ -z "$prefix_part" ]]; then
            prefix_part="xcaws"
          fi
          run_suffix="${GITHUB_RUN_ID:(-8)}"
          credential_name="${prefix_part}-${run_suffix}-skcfg"
          credential_name="${credential_name#-}"
          credential_name="${credential_name%-}"
          candidates=()
          if [[ -n "${XC_SERVICE_CREDENTIAL_ROLE:-}" ]]; then
            candidates+=("$XC_SERVICE_CREDENTIAL_ROLE")
          fi
          candidates+=("ves-io-admin-role" "Admin" "admin" "Standard" "standard" "ves-io-admin")

          selected_role=""
          for role in "${candidates[@]}"; do
            [[ -z "$role" ]] && continue
            if [[ " ${tried_roles:-} " == *" $role "* ]]; then
              continue
            fi
            tried_roles="${tried_roles:-} $role"

            apply_log="$RUNNER_TEMP/kubeconfig-apply-${role}.log"
            for attempt in $(seq 1 20); do
              if terraform -chdir=aws-mk8s-vk8s/kubeconfig apply -auto-approve \
                -var="project_prefix=${PROJECT_PREFIX}" \
                -var="site_name=${{ needs.prerequisites.outputs.app_stack_name }}" \
                -var="xc_namespace=${{ needs.prerequisites.outputs.xc_namespace }}" \
                -var="service_credential_role=${role}" \
                -var="credential_name=${credential_name}" \
                -var="xc_api_url=${{ secrets.XC_API_URL }}" \
                -var="xc_api_p12_file=$RUNNER_TEMP/xc-api-creds.p12" \
                >"$apply_log" 2>&1
              then
                selected_role="$role"
                break 2
              fi

              if grep -q "role '.*' is not found or it is disabled" "$apply_log"; then
                break
              fi

              if grep -Eqi "not found|failed to find site|site.*not.*ready|timed out|timeout|connection refused|unavailable|EOF" "$apply_log" && [[ "$attempt" -lt 20 ]]; then
                echo "Site kubeconfig not available yet for role ${role} (attempt ${attempt}/20); retrying in 15s"
                sleep 15
                continue
              fi

              cat "$apply_log"
              exit 1
            done
          done

          if [[ -z "$selected_role" ]]; then
            echo "::error::Unable to create the XC site kubeconfig credential with any known role. Set repository variable XC_SERVICE_CREDENTIAL_ROLE to a valid role for this tenant."
            exit 1
          fi

          terraform -chdir=aws-mk8s-vk8s/kubeconfig output -raw kubeconfig_content > "$RUNNER_TEMP/mk8s-kubeconfig.yaml"
          echo "credential_name=${credential_name}" >> "$GITHUB_OUTPUT"
          echo "kubeconfig_path=$RUNNER_TEMP/mk8s-kubeconfig.yaml" >> "$GITHUB_OUTPUT"
          echo "service_credential_role=${selected_role}" >> "$GITHUB_OUTPUT"

      - name: Wait for mK8s API readiness
        shell: bash
        run: |
          set -euo pipefail
          kubeconfig_path="${{ steps.kubeconfig.outputs.kubeconfig_path }}"
          attempts=80
          sleep_seconds=15
          cluster_info_log="$RUNNER_TEMP/mk8s-cluster-info.log"
          namespace_probe_log="$RUNNER_TEMP/mk8s-namespace-probe.log"

          for attempt in $(seq 1 "$attempts"); do
            if kubectl --kubeconfig "$kubeconfig_path" --request-timeout=10s cluster-info >"$cluster_info_log" 2>&1 && \
              kubectl --kubeconfig "$kubeconfig_path" --request-timeout=10s get namespace default -o name >"$namespace_probe_log" 2>&1; then
              cat "$cluster_info_log"
              cat "$namespace_probe_log"
              exit 0
            fi

            echo "mK8s API not ready yet (attempt ${attempt}/${attempts}); waiting ${sleep_seconds}s"
            if [[ -s "$cluster_info_log" ]]; then
              tail -n 5 "$cluster_info_log"
            fi
            if [[ -s "$namespace_probe_log" ]]; then
              tail -n 5 "$namespace_probe_log"
            fi
            sleep "$sleep_seconds"
          done

          echo "::error::Timed out waiting for the mK8s API server to become ready."
          kubectl --kubeconfig "$kubeconfig_path" --request-timeout=10s cluster-info || true
          kubectl --kubeconfig "$kubeconfig_path" --request-timeout=10s get namespace default -o name || true
          exit 1

      - name: Wait for mK8s control plane health
        shell: bash
        run: |
          set -euo pipefail
          kubeconfig_path='${{ steps.kubeconfig.outputs.kubeconfig_path }}'
          attempts=40
          sleep_seconds=15

          for attempt in $(seq 1 "$attempts"); do
            node_ready="$(kubectl --kubeconfig "$kubeconfig_path" get nodes --no-headers 2>/dev/null | awk '$2 == "Ready" {count++} END {print count+0}')"
            etcd_phase="$(kubectl --kubeconfig "$kubeconfig_path" -n ves-system get pod etcd-0 -o jsonpath='{.status.phase}' 2>/dev/null || true)"
            etcd_ready="$(kubectl --kubeconfig "$kubeconfig_path" -n ves-system get pod etcd-0 -o jsonpath='{range .status.containerStatuses[*]}{.ready}{" "}{end}' 2>/dev/null || true)"
            phobos_summary="$(kubectl --kubeconfig "$kubeconfig_path" -n ves-system get pods -l name=phobos1 --no-headers 2>/dev/null || true)"
            phobos_running="$(printf '%s\n' "$phobos_summary" | awk '$3 == "Running" && $2 ~ /^2\/2$/ {count++} END {print count+0}')"

            echo "Ready nodes: ${node_ready}"
            echo "etcd-0 phase: ${etcd_phase:-missing} | containers ready: ${etcd_ready:-unknown}"
            if [[ -n "$phobos_summary" ]]; then
              echo "$phobos_summary"
            else
              echo "No phobos1 pods reported yet."
            fi

            if [[ "$node_ready" -ge 1 && "$etcd_phase" == "Running" && "$etcd_ready" == *"true true"* && "$phobos_running" -ge 1 ]]; then
              exit 0
            fi

            if [[ "$attempt" -lt "$attempts" ]]; then
              echo "mK8s control plane not healthy yet (attempt ${attempt}/${attempts}); waiting ${sleep_seconds}s"
              sleep "$sleep_seconds"
            fi
          done

          echo "::error::Timed out waiting for critical ves-system pods to become healthy."
          kubectl --kubeconfig "$kubeconfig_path" get nodes -o wide || true
          kubectl --kubeconfig "$kubeconfig_path" -n ves-system get pods -o wide || true
          kubectl --kubeconfig "$kubeconfig_path" -n ves-system describe pod etcd-0 || true
          kubectl --kubeconfig "$kubeconfig_path" -n ves-system describe pvc data-etcd-0 || true
          kubectl --kubeconfig "$kubeconfig_path" -n ves-system get pods -l name=phobos1 -o wide || true
          phobos_pod="$(kubectl --kubeconfig "$kubeconfig_path" -n ves-system get pods -l name=phobos1 -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)"
          if [[ -n "$phobos_pod" ]]; then
            kubectl --kubeconfig "$kubeconfig_path" -n ves-system describe pod "$phobos_pod" || true
          fi
          exit 1

      - name: Terraform init module 1
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/module-1.backend.hcl" <<EOF
          organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
          workspaces {
            name = "${MODULE1_WORKSPACE}"
          }
          EOF
          terraform -chdir=aws-mk8s-vk8s/module-1 init \
            -backend-config="$RUNNER_TEMP/module-1.backend.hcl"

      - name: Terraform apply module 1
        shell: bash
        run: |
          set -euo pipefail
          apply_log="$RUNNER_TEMP/module-1-apply.log"
          attempts=4
          sleep_seconds=30

          for attempt in $(seq 1 "$attempts"); do
            if terraform -chdir=aws-mk8s-vk8s/module-1 apply -auto-approve \
              -var="project_prefix=${PROJECT_PREFIX}" \
              -var="xc_namespace=${{ needs.prerequisites.outputs.xc_namespace }}" \
              -var="xc_api_url=${{ secrets.XC_API_URL }}" \
              -var="xc_api_p12_file=$RUNNER_TEMP/xc-api-creds.p12" \
              -var="kubeconfig_path=${{ steps.kubeconfig.outputs.kubeconfig_path }}" \
              -var="app_stack_name=${{ needs.prerequisites.outputs.app_stack_name }}" \
              >"$apply_log" 2>&1
            then
              cat "$apply_log"
              exit 0
            fi

            cat "$apply_log"
            if grep -Fq "the server is currently unable to handle the request" "$apply_log" && [[ "$attempt" -lt "$attempts" ]]; then
              echo "Transient mK8s API error during module 1 apply (attempt ${attempt}/${attempts}); retrying in ${sleep_seconds}s"
              sleep "$sleep_seconds"
              continue
            fi

            exit 1
          done

      - name: Collect module 1 outputs
        id: module_outputs
        shell: bash
        run: |
          set -euo pipefail
          echo "kiosk_domain=$(terraform -chdir=aws-mk8s-vk8s/module-1 output -raw kiosk_domain)" >> "$GITHUB_OUTPUT"
          echo "recommendations_domain=$(terraform -chdir=aws-mk8s-vk8s/module-1 output -raw recommendations_domain)" >> "$GITHUB_OUTPUT"

      - name: Validate mK8s workloads
        shell: bash
        run: |
          set -euo pipefail
          namespace='${{ needs.prerequisites.outputs.xc_namespace }}'
          kubeconfig_path='${{ steps.kubeconfig.outputs.kubeconfig_path }}'

          kubectl --kubeconfig "$kubeconfig_path" get namespace "$namespace"
          kubectl --kubeconfig "$kubeconfig_path" -n "$namespace" get deployments,svc -o wide

          kubectl --kubeconfig "$kubeconfig_path" -n "$namespace" rollout status deployment/mysql-deployment --timeout=10m
          kubectl --kubeconfig "$kubeconfig_path" -n "$namespace" rollout status deployment/wordpress-deployment --timeout=10m
          kubectl --kubeconfig "$kubeconfig_path" -n "$namespace" rollout status deployment/kiosk-deployment --timeout=10m

          kubectl --kubeconfig "$kubeconfig_path" -n "$namespace" get pods -o wide

      - name: Configure BuyTime recommendations plugin
        shell: bash
        run: |
          set -euo pipefail
          namespace='${{ needs.prerequisites.outputs.xc_namespace }}'
          kubeconfig_path='${{ steps.kubeconfig.outputs.kubeconfig_path }}'
          recommendations_domain='${{ steps.module_outputs.outputs.recommendations_domain }}'
          wordpress_pod="$(kubectl --kubeconfig "$kubeconfig_path" -n "$namespace" get pod -l app=wordpress -o jsonpath='{.items[0].metadata.name}')"
          php_script="$RUNNER_TEMP/configure-buytime-recommendations.php"

          if [[ -z "$wordpress_pod" ]]; then
            echo "::error::Unable to locate the wordpress pod to configure the BuyTime plugin."
            exit 1
          fi

          cat > "$php_script" <<PHP
          <?php
          require '/var/www/html/wp-load.php';

          \$domain = '${recommendations_domain}';
          if (\$domain === '') {
              fwrite(STDERR, "Missing recommendations domain.\n");
              exit(1);
          }

          \$options = get_option('recommendations_server');
          if (!is_array(\$options)) {
              \$options = array();
          }

          \$options['recommendation_server_url'] = \$domain;
          update_option('recommendations_server', \$options, true);

          \$current = get_option('recommendations_server');
          if (!is_array(\$current) || (\$current['recommendation_server_url'] ?? '') !== \$domain) {
              fwrite(STDERR, "Failed to persist the recommendations server URL.\n");
              exit(1);
          }

          fwrite(STDOUT, "Configured recommendations_server_url=\$domain\n");
          PHP

          kubectl --kubeconfig "$kubeconfig_path" -n "$namespace" exec "$wordpress_pod" -- php -v >/dev/null
          kubectl --kubeconfig "$kubeconfig_path" -n "$namespace" exec -i "$wordpress_pod" -- sh -c 'cat > /tmp/configure-buytime-recommendations.php' < "$php_script"
          kubectl --kubeconfig "$kubeconfig_path" -n "$namespace" exec "$wordpress_pod" -- php /tmp/configure-buytime-recommendations.php
          kubectl --kubeconfig "$kubeconfig_path" -n "$namespace" exec "$wordpress_pod" -- rm -f /tmp/configure-buytime-recommendations.php || true

      - name: Smoke test kiosk application
        shell: bash
        run: |
          set -euo pipefail
          namespace='${{ needs.prerequisites.outputs.xc_namespace }}'
          kubeconfig_path='${{ steps.kubeconfig.outputs.kubeconfig_path }}'
          kiosk_domain='${{ steps.module_outputs.outputs.kiosk_domain }}'
          forward_log="$RUNNER_TEMP/kiosk-port-forward.log"
          home_body="$RUNNER_TEMP/kiosk-home.html"
          admin_headers="$RUNNER_TEMP/kiosk-admin.headers"

          kubectl --kubeconfig "$kubeconfig_path" -n "$namespace" port-forward service/kiosk-service 18080:8080 >"$forward_log" 2>&1 &
          forward_pid=$!
          cleanup() {
            kill "$forward_pid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for attempt in $(seq 1 20); do
            if curl --silent --show-error --fail -H "Host: $kiosk_domain" http://127.0.0.1:18080/ >"$home_body" 2>/dev/null; then
              break
            fi
            sleep 5
          done

          if ! grep -Eiq '<title>BuyTime</title>|BuyTime|WooCommerce|WordPress' "$home_body"; then
            echo "::error::Kiosk home page smoke test did not return expected content."
            cat "$home_body"
            exit 1
          fi

          curl --silent --show-error -I -H "Host: $kiosk_domain" http://127.0.0.1:18080/wp-admin/ >"$admin_headers"
          if ! grep -Eq '^HTTP/[0-9.]+ (200|301|302)' "$admin_headers"; then
            echo "::error::WordPress admin endpoint did not return an expected status."
            cat "$admin_headers"
            exit 1
          fi

      - name: Verify recommendations origin reachability
        shell: bash
        run: |
          set -euo pipefail
          origin_dns="${RECOMMENDATIONS_ORIGIN_DNS:-recommendations.buytime.sr.f5-cloud-demo.com}"
          origin_port="${RECOMMENDATIONS_ORIGIN_PORT:-443}"
          http_code="$(curl \
            --silent \
            --show-error \
            --output /dev/null \
            --write-out '%{http_code}' \
            --max-time 20 \
            "https://${origin_dns}:${origin_port}/" || true)"

          if [[ "$http_code" == "000" || -z "$http_code" ]]; then
            echo "::error::Unable to reach the recommendations origin ${origin_dns}:${origin_port}."
            exit 1
          fi

          echo "Recommendations origin responded with HTTP ${http_code}."

      - name: Write deployment summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Deploy Summary"
            echo
            echo "- App Stack site: ${{ needs.prerequisites.outputs.app_stack_name }}"
            echo "- XC namespace: ${{ needs.prerequisites.outputs.xc_namespace }}"
            echo "- mK8s cluster: ${{ needs.prerequisites.outputs.mk8s_cluster_name }}"
            echo "- App Stack private IP: ${{ needs.prerequisites.outputs.appstack_private_ip }}"
            echo "- Kiosk VM public IP: ${{ needs.prerequisites.outputs.kiosk_address }}"
            echo "- Kiosk VM user: ${{ needs.prerequisites.outputs.kiosk_user }}"
            echo "- Kiosk domain: ${{ steps.module_outputs.outputs.kiosk_domain }}"
            echo "- Recommendations domain: ${{ steps.module_outputs.outputs.recommendations_domain }}"
            echo
            echo "### Notes"
            echo
            echo "- The workflow validates deployment readiness for mysql, wordpress, and kiosk."
            echo "- The BuyTime recommendations plugin is configured automatically inside WordPress."
            echo "- The kiosk app is smoke-tested through the in-cluster service using the expected Host header."
            echo "- The recommendations origin endpoint is checked for HTTP reachability."
            echo "- The kubeconfig used by the workflow is temporary and is revoked at the end of the job."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Revoke temporary kubeconfig credential
        if: always()
        shell: bash
        run: |
          set +e
          terraform -chdir=aws-mk8s-vk8s/kubeconfig destroy -auto-approve \
            -var="project_prefix=${PROJECT_PREFIX}" \
            -var="site_name=${{ needs.prerequisites.outputs.app_stack_name }}" \
            -var="xc_namespace=${{ needs.prerequisites.outputs.xc_namespace }}" \
            -var="service_credential_role=${{ steps.kubeconfig.outputs.service_credential_role }}" \
            -var="credential_name=${{ steps.kubeconfig.outputs.credential_name }}" \
            -var="xc_api_url=${{ secrets.XC_API_URL }}" \
            -var="xc_api_p12_file=$RUNNER_TEMP/xc-api-creds.p12"

  ce_prerequisites:
    name: Apply CE prerequisites
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: ${{ inputs.deployment_stage == 'module-1' }}
    needs:
      - prerequisites
      - module_1
    env:
      VES_P12_PASSWORD: ${{ secrets.XC_P12_PASSWORD }}
      TF_VAR_environment: ${{ vars.CE_SITE_NAME }}
      TF_VAR_site_name: ${{ vars.CE_SITE_NAME }}
      TF_VAR_vpc_cidr: ${{ vars.VPC_CIDR_CE }}
      TF_VAR_create_module2_foundations: "false"
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_aws_access_key: ${{ secrets.AWS_ACCESS_KEY }}
      TF_VAR_aws_secret_key: ${{ secrets.AWS_SECRET_KEY }}
      TF_VAR_xc_api_url: ${{ secrets.XC_API_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Validate workflow configuration
        shell: bash
        run: |
          set -euo pipefail
          for name in AWS_REGION PROJECT_PREFIX CE_SITE_NAME VPC_CIDR_CE; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required repository variable: ${name}."
              exit 1
            fi
          done
          python3 - <<'PY'
          import ipaddress
          import os
          import sys

          cidr = os.environ["VPC_CIDR_CE"]
          try:
              ipaddress.ip_network(cidr, strict=False)
          except Exception as exc:
              print(f"::error::VPC_CIDR_CE must be a valid CIDR block. Received {cidr!r}: {exc}")
              sys.exit(1)
          PY

      - name: Restore CE workspace name
        shell: bash
        run: |
          set -euo pipefail
          workspace_prefix='${{ needs.prerequisites.outputs.workspace_prefix }}'
          echo "CE_WORKSPACE=${workspace_prefix}-aws-ce-site" >> "$GITHUB_ENV"

      - name: Decode XC API credential
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' '${{ secrets.XC_API_P12_FILE }}' | base64 --decode > "$RUNNER_TEMP/xc-api-creds.p12"
          echo "TF_VAR_xc_api_p12_file=$RUNNER_TEMP/xc-api-creds.p12" >> "$GITHUB_ENV"

      - name: Validate XC API client certificate
        shell: bash
        run: |
          set -euo pipefail
          openssl pkcs12 \
            -in "$RUNNER_TEMP/xc-api-creds.p12" \
            -clcerts \
            -legacy \
            -nokeys \
            -passin env:VES_P12_PASSWORD \
            -out "$RUNNER_TEMP/xc-api-cert.pem"
          openssl pkcs12 \
            -in "$RUNNER_TEMP/xc-api-creds.p12" \
            -legacy \
            -nocerts \
            -nodes \
            -passin env:VES_P12_PASSWORD \
            -out "$RUNNER_TEMP/xc-api-key.pem"
          end_date="$(openssl x509 -in "$RUNNER_TEMP/xc-api-cert.pem" -noout -enddate | cut -d= -f2-)"
          if ! openssl x509 -in "$RUNNER_TEMP/xc-api-cert.pem" -checkend 0 -noout; then
            echo "::error::XC API client certificate is expired. notAfter=${end_date}. Rotate the certificate in F5 XC and update secrets XC_API_P12_FILE and XC_P12_PASSWORD."
            exit 1
          fi

      - name: Wait for branch namespace availability in XC
        shell: bash
        run: |
          set -euo pipefail
          api_url='${{ secrets.XC_API_URL }}'
          api_root="${api_url%/}"
          api_root="${api_root%/api}"
          namespace='${{ needs.prerequisites.outputs.xc_namespace }}'
          namespace_endpoint="${api_root}/api/web/namespaces/${namespace}"
          attempts=30
          sleep_seconds=10

          for attempt in $(seq 1 "$attempts"); do
            http_code="$(curl \
              --silent \
              --show-error \
              --output "$RUNNER_TEMP/module-2-branch-namespace.json" \
              --write-out '%{http_code}' \
              --cert "$RUNNER_TEMP/xc-api-cert.pem" \
              --key "$RUNNER_TEMP/xc-api-key.pem" \
              "$namespace_endpoint" || true)"

            case "$http_code" in
              200)
                echo "XC namespace ${namespace} is available."
                exit 0
                ;;
              404)
                ;;
              *)
                echo "::error::Unable to confirm XC namespace ${namespace} availability (HTTP ${http_code:-curl-error})."
                if [[ -s "$RUNNER_TEMP/module-2-branch-namespace.json" ]]; then
                  cat "$RUNNER_TEMP/module-2-branch-namespace.json"
                fi
                exit 1
                ;;
            esac

            if [[ "$attempt" -lt "$attempts" ]]; then
              echo "XC namespace ${namespace} not visible yet (attempt ${attempt}/${attempts}); waiting ${sleep_seconds}s"
              sleep "$sleep_seconds"
            fi
          done

          echo "::error::Timed out waiting for XC namespace ${namespace} to become available."
          if [[ -s "$RUNNER_TEMP/module-2-branch-namespace.json" ]]; then
            cat "$RUNNER_TEMP/module-2-branch-namespace.json"
          fi
          exit 1

      - name: Terraform init CE prerequisites
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ce-prerequisites.backend.hcl" <<EOF
          organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
          workspaces {
            name = "${CE_WORKSPACE}"
          }
          EOF
          terraform -chdir=aws-mk8s-vk8s/aws-ce-site init \
            -backend-config="$RUNNER_TEMP/ce-prerequisites.backend.hcl"

      - name: Terraform apply CE prerequisites
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=aws-mk8s-vk8s/aws-ce-site apply -auto-approve

      - name: Wait for XC CE site readiness
        shell: bash
        run: |
          set -euo pipefail
          api_url='${{ secrets.XC_API_URL }}'
          api_root="${api_url%/}"
          api_root="${api_root%/api}"
          site_name='${{ vars.CE_SITE_NAME }}'
          site_endpoint="${api_root}/api/config/namespaces/system/sites/${site_name}"
          attempts=120
          sleep_seconds=30
          response_file="$RUNNER_TEMP/ce-site-status.json"

          for attempt in $(seq 1 "$attempts"); do
            http_code="$(curl \
              --silent \
              --show-error \
              --output "$response_file" \
              --write-out '%{http_code}' \
              --cert "$RUNNER_TEMP/xc-api-cert.pem" \
              --key "$RUNNER_TEMP/xc-api-key.pem" \
              "$site_endpoint" || true)"

            if [[ "$http_code" == "200" ]]; then
              site_state="$(jq -r '[.spec?.site_state, .replace_form?.spec?.site_state, .site_state, .status[]?.site_state] | map(select(. != null and . != "")) | first // ""' "$response_file")"
              operational_status="$(jq -r '[.status[]?.conditions[]? | select(.type == "Operational") | .status] | map(select(. != null and . != "")) | first // ""' "$response_file")"
              status_summary="$(jq -r '[.status[]?.conditions[]? | select(.type != null and .status != null) | "\(.type)=\(.status)" , (.status[]?.site_state // empty), .spec?.site_state, .replace_form?.spec?.site_state] | map(select(. != null and . != "")) | unique | join(" | ")' "$response_file")"
              if [[ -z "$status_summary" || "$status_summary" == "null" ]]; then
                status_summary="no detailed status"
              fi

              echo "XC CE site state: ${site_state:-unknown}"
              echo "XC CE site operational status: ${operational_status:-unknown}"
              echo "XC CE site details: ${status_summary}"

              case "$site_state" in
                ONLINE|ORCHESTRATION_COMPLETE|VALIDATION_SUCCESS)
                  exit 0
                  ;;
                FAILED|FAILED_INACTIVE|ERROR_IN_ORCHESTRATION|VALIDATION_FAILED|ERROR_DELETING_CLOUD_RESOURCES|ERROR_UPDATING_CLOUD_RESOURCES)
                  echo "::error::XC CE site entered a terminal state: ${site_state}."
                  cat "$response_file"
                  exit 1
                  ;;
              esac
            else
              echo "Unable to read XC CE site status yet (attempt ${attempt}/${attempts}, HTTP ${http_code:-curl-error})."
              if [[ -s "$response_file" ]]; then
                cat "$response_file"
              fi
            fi

            if [[ "$attempt" -lt "$attempts" ]]; then
              echo "XC CE site not ready yet (attempt ${attempt}/${attempts}); waiting ${sleep_seconds}s"
              sleep "$sleep_seconds"
            fi
          done

          echo "::error::Timed out waiting for the XC CE site to become ready."
          if [[ -s "$response_file" ]]; then
            cat "$response_file"
          fi
          exit 1

      - name: Write CE deployment summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## CE Summary"
            echo
            echo "- CE site name: ${CE_SITE_NAME}"
            echo "- CE VPC CIDR: ${VPC_CIDR_CE}"
            echo "- CE workspace: ${CE_WORKSPACE}"
            echo "- Module 2 foundations created: no"
            echo "- CE site readiness validated: yes"
          } >> "$GITHUB_STEP_SUMMARY"

  module_2:
    name: Apply module 2
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: ${{ inputs.deployment_stage == 'module-2' }}
    env:
      VES_P12_PASSWORD: ${{ secrets.XC_P12_PASSWORD }}
      TF_VAR_cloud_credential_name: ${{ vars.CE_SITE_NAME }}
      TF_VAR_create_cloud_credential: "false"
      TF_VAR_manage_site_infrastructure: "false"
      TF_VAR_create_namespace: "true"
      TF_VAR_create_re_virtual_site: "true"
      TF_VAR_create_ce_virtual_site: "true"
      TF_VAR_create_virtual_k8s: "true"
      TF_VAR_virtual_k8s_name: buytime-online-vk8s
      TF_VAR_api_credential_name: m2vk-${{ github.run_id }}-${{ github.run_attempt }}
      TF_VAR_site_name: ${{ vars.CE_SITE_NAME }}
      TF_VAR_vpc_cidr: ${{ vars.VPC_CIDR_CE }}
      TF_VAR_create_module2_foundations: "true"
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_aws_access_key: ${{ secrets.AWS_ACCESS_KEY }}
      TF_VAR_aws_secret_key: ${{ secrets.AWS_SECRET_KEY }}
      TF_VAR_xc_api_url: ${{ secrets.XC_API_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Validate workflow configuration
        shell: bash
        run: |
          set -euo pipefail
          for name in AWS_REGION PROJECT_PREFIX XC_NAMESPACE CE_SITE_NAME VPC_CIDR_CE; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required repository variable: ${name}."
              exit 1
            fi
          done
          python3 - <<'PY'
          import ipaddress
          import os
          import sys

          cidr = os.environ["VPC_CIDR_CE"]
          try:
              ipaddress.ip_network(cidr, strict=False)
          except Exception as exc:
              print(f"::error::VPC_CIDR_CE must be a valid CIDR block. Received {cidr!r}: {exc}")
              sys.exit(1)
          PY

      - name: Compute workspace names
        shell: bash
        run: |
          set -euo pipefail
          raw="${PROJECT_PREFIX}-${XC_NAMESPACE}"
          workspace_prefix="$(printf '%s' "$raw" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9-' '-')"
          workspace_prefix="${workspace_prefix#-}"
          workspace_prefix="${workspace_prefix%-}"
          if [[ -z "$workspace_prefix" ]]; then
            workspace_prefix="xcawsedgedemo"
          fi
          echo "PREREQUISITES_WORKSPACE=${workspace_prefix}-prerequisites" >> "$GITHUB_ENV"
          echo "CE_WORKSPACE=${workspace_prefix}-aws-ce-site" >> "$GITHUB_ENV"
          echo "MODULE2_WORKSPACE=${workspace_prefix}-module-2" >> "$GITHUB_ENV"

      - name: Decode XC API credential
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' '${{ secrets.XC_API_P12_FILE }}' | base64 --decode > "$RUNNER_TEMP/xc-api-creds.p12"
          echo "TF_VAR_xc_api_p12_file=$RUNNER_TEMP/xc-api-creds.p12" >> "$GITHUB_ENV"

      - name: Validate XC API client certificate
        shell: bash
        run: |
          set -euo pipefail
          openssl pkcs12 \
            -in "$RUNNER_TEMP/xc-api-creds.p12" \
            -clcerts \
            -legacy \
            -nokeys \
            -passin env:VES_P12_PASSWORD \
            -out "$RUNNER_TEMP/xc-api-cert.pem"
          openssl pkcs12 \
            -in "$RUNNER_TEMP/xc-api-creds.p12" \
            -legacy \
            -nocerts \
            -nodes \
            -passin env:VES_P12_PASSWORD \
            -out "$RUNNER_TEMP/xc-api-key.pem"
          end_date="$(openssl x509 -in "$RUNNER_TEMP/xc-api-cert.pem" -noout -enddate | cut -d= -f2-)"
          if ! openssl x509 -in "$RUNNER_TEMP/xc-api-cert.pem" -checkend 0 -noout; then
            echo "::error::XC API client certificate is expired. notAfter=${end_date}. Rotate the certificate in F5 XC and update secrets XC_API_P12_FILE and XC_P12_PASSWORD."
            exit 1
          fi

      - name: Restore prerequisites outputs
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/module-2-prerequisites.backend.hcl" <<EOF
          organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
          workspaces {
            name = "${PREREQUISITES_WORKSPACE}"
          }
          EOF
          terraform -chdir=aws-mk8s-vk8s/prerequisites init \
            -backend-config="$RUNNER_TEMP/module-2-prerequisites.backend.hcl"

          app_stack_name="$(terraform -chdir=aws-mk8s-vk8s/prerequisites output -raw app_stack_name 2>/dev/null || true)"
          xc_namespace="$(terraform -chdir=aws-mk8s-vk8s/prerequisites output -raw xc_namespace 2>/dev/null || true)"

          if [[ -z "$app_stack_name" || -z "$xc_namespace" ]]; then
            echo "::error::Unable to read prerequisite outputs from workspace ${PREREQUISITES_WORKSPACE}. Run stage module-1 successfully before module-2."
            exit 1
          fi

          echo "APP_STACK_NAME=${app_stack_name}" >> "$GITHUB_ENV"
          echo "XC_NAMESPACE_OUTPUT=${xc_namespace}" >> "$GITHUB_ENV"

      - name: Terraform init branch kubeconfig helper
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=aws-mk8s-vk8s/kubeconfig init

      - name: Generate branch site kubeconfig
        id: branch_kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          prefix_part="$(printf '%s' "$PROJECT_PREFIX" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9-' '-' | cut -c1-12)"
          prefix_part="${prefix_part#-}"
          prefix_part="${prefix_part%-}"
          if [[ -z "$prefix_part" ]]; then
            prefix_part="xcaws"
          fi
          run_suffix="${GITHUB_RUN_ID:(-8)}"
          credential_name="${prefix_part}-${run_suffix}-m2cfg"
          credential_name="${credential_name#-}"
          credential_name="${credential_name%-}"

          candidates=()
          if [[ -n "${XC_SERVICE_CREDENTIAL_ROLE:-}" ]]; then
            candidates+=("$XC_SERVICE_CREDENTIAL_ROLE")
          fi
          candidates+=("ves-io-admin-role" "Admin" "admin" "Standard" "standard" "ves-io-admin")

          selected_role=""
          for role in "${candidates[@]}"; do
            [[ -z "$role" ]] && continue
            if [[ " ${tried_roles:-} " == *" $role "* ]]; then
              continue
            fi
            tried_roles="${tried_roles:-} $role"

            apply_log="$RUNNER_TEMP/module-2-branch-kubeconfig-${role}.log"
            if terraform -chdir=aws-mk8s-vk8s/kubeconfig apply -auto-approve \
              -var="project_prefix=${PROJECT_PREFIX}" \
              -var="site_name=${APP_STACK_NAME}" \
              -var="xc_namespace=${XC_NAMESPACE_OUTPUT}" \
              -var="service_credential_role=${role}" \
              -var="credential_name=${credential_name}" \
              -var="xc_api_url=${{ secrets.XC_API_URL }}" \
              -var="xc_api_p12_file=$RUNNER_TEMP/xc-api-creds.p12" \
              >"$apply_log" 2>&1
            then
              selected_role="$role"
              break
            fi

            if ! grep -q "role '.*' is not found or it is disabled" "$apply_log"; then
              cat "$apply_log"
              exit 1
            fi
          done

          if [[ -z "$selected_role" ]]; then
            echo "::error::Unable to create the branch site kubeconfig credential with any known role. Set repository variable XC_SERVICE_CREDENTIAL_ROLE to a valid role for this tenant."
            exit 1
          fi

          terraform -chdir=aws-mk8s-vk8s/kubeconfig output -raw kubeconfig_content > "$RUNNER_TEMP/module-2-branch-kubeconfig.yaml"
          echo "credential_name=${credential_name}" >> "$GITHUB_OUTPUT"
          echo "kubeconfig_path=$RUNNER_TEMP/module-2-branch-kubeconfig.yaml" >> "$GITHUB_OUTPUT"
          echo "service_credential_role=${selected_role}" >> "$GITHUB_OUTPUT"

      - name: Terraform init CE foundations
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/module-2-ce.backend.hcl" <<EOF
          organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
          workspaces {
            name = "${CE_WORKSPACE}"
          }
          EOF
          terraform -chdir=aws-mk8s-vk8s/aws-ce-site init \
            -backend-config="$RUNNER_TEMP/module-2-ce.backend.hcl"

      - name: Detect existing module 2 namespace
        shell: bash
        run: |
          set -euo pipefail
          api_url='${{ secrets.XC_API_URL }}'
          api_root="${api_url%/}"
          api_root="${api_root%/api}"
          namespace_endpoint="${api_root}/api/web/namespaces/${MODULE2_ENVIRONMENT}"
          http_code="$(curl \
            --silent \
            --show-error \
            --output "$RUNNER_TEMP/module-2-namespace.json" \
            --write-out '%{http_code}' \
            --cert "$RUNNER_TEMP/xc-api-cert.pem" \
            --key "$RUNNER_TEMP/xc-api-key.pem" \
            "$namespace_endpoint" || true)"

          case "$http_code" in
            200)
              echo "TF_VAR_create_namespace=false" >> "$GITHUB_ENV"
              echo "Namespace ${MODULE2_ENVIRONMENT} already exists in XC; module-2 will reuse it."
              ;;
            404)
              echo "TF_VAR_create_namespace=true" >> "$GITHUB_ENV"
              echo "Namespace ${MODULE2_ENVIRONMENT} does not exist in XC yet; module-2 will create it."
              ;;
            *)
              echo "::error::Unable to determine whether namespace ${MODULE2_ENVIRONMENT} exists in XC (HTTP ${http_code:-curl-error})."
              if [[ -s "$RUNNER_TEMP/module-2-namespace.json" ]]; then
                cat "$RUNNER_TEMP/module-2-namespace.json"
              fi
              exit 1
              ;;
          esac

      - name: Detect existing module 2 virtual sites
        shell: bash
        run: |
          set -euo pipefail
          api_url='${{ secrets.XC_API_URL }}'
          api_root="${api_url%/}"
          api_root="${api_root%/api}"

          declare -a checks=(
            "buytime-re-sites:TF_VAR_create_re_virtual_site:module-2-re-virtual-site.json"
            "buytime-ce-sites:TF_VAR_create_ce_virtual_site:module-2-ce-virtual-site.json"
          )

          for check in "${checks[@]}"; do
            IFS=':' read -r virtual_site_name env_name output_file <<< "$check"
            endpoint="${api_root}/api/config/namespaces/${MODULE2_ENVIRONMENT}/virtual_sites/${virtual_site_name}"
            http_code="$(curl \
              --silent \
              --show-error \
              --output "$RUNNER_TEMP/${output_file}" \
              --write-out '%{http_code}' \
              --cert "$RUNNER_TEMP/xc-api-cert.pem" \
              --key "$RUNNER_TEMP/xc-api-key.pem" \
              "$endpoint" || true)"

            case "$http_code" in
              200)
                echo "${env_name}=false" >> "$GITHUB_ENV"
                echo "Virtual site ${virtual_site_name} already exists in XC; module-2 will reuse it."
                ;;
              404)
                echo "${env_name}=true" >> "$GITHUB_ENV"
                echo "Virtual site ${virtual_site_name} does not exist in XC yet; module-2 will create it."
                ;;
              *)
                echo "::error::Unable to determine whether virtual site ${virtual_site_name} exists in XC (HTTP ${http_code:-curl-error})."
                if [[ -s "$RUNNER_TEMP/${output_file}" ]]; then
                  cat "$RUNNER_TEMP/${output_file}"
                fi
                exit 1
                ;;
            esac
          done

      - name: Detect existing module 2 virtual k8s
        shell: bash
        run: |
          set -euo pipefail
          api_url='${{ secrets.XC_API_URL }}'
          api_root="${api_url%/}"
          api_root="${api_root%/api}"
          virtual_k8s_name="${TF_VAR_virtual_k8s_name}"
          endpoint="${api_root}/api/config/namespaces/${MODULE2_ENVIRONMENT}/virtual_k8ss/${virtual_k8s_name}"
          http_code="$(curl \
            --silent \
            --show-error \
            --output "$RUNNER_TEMP/module-2-virtual-k8s.json" \
            --write-out '%{http_code}' \
            --cert "$RUNNER_TEMP/xc-api-cert.pem" \
            --key "$RUNNER_TEMP/xc-api-key.pem" \
            "$endpoint" || true)"

          case "$http_code" in
            200)
              echo "TF_VAR_create_virtual_k8s=false" >> "$GITHUB_ENV"
              echo "Virtual k8s ${virtual_k8s_name} already exists in XC; module-2 will reuse it."
              ;;
            404)
              echo "TF_VAR_create_virtual_k8s=true" >> "$GITHUB_ENV"
              echo "Virtual k8s ${virtual_k8s_name} does not exist in XC yet; module-2 will create it."
              ;;
            *)
              echo "::error::Unable to determine whether virtual k8s ${virtual_k8s_name} exists in XC (HTTP ${http_code:-curl-error})."
              if [[ -s "$RUNNER_TEMP/module-2-virtual-k8s.json" ]]; then
                cat "$RUNNER_TEMP/module-2-virtual-k8s.json"
              fi
              exit 1
              ;;
          esac

      - name: Terraform apply CE foundations for module 2
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=aws-mk8s-vk8s/aws-ce-site apply -auto-approve \
            -var="cloud_credential_name=${CE_SITE_NAME}" \
            -var="create_cloud_credential=false" \
            -var="create_namespace=${TF_VAR_create_namespace}" \
            -var="create_re_virtual_site=${TF_VAR_create_re_virtual_site}" \
            -var="create_ce_virtual_site=${TF_VAR_create_ce_virtual_site}" \
            -var="create_virtual_k8s=${TF_VAR_create_virtual_k8s}" \
            -var="manage_site_infrastructure=false" \
            -var="virtual_k8s_name=${TF_VAR_virtual_k8s_name}" \
            -var="api_credential_name=${TF_VAR_api_credential_name}" \
            -var="environment=${MODULE2_ENVIRONMENT}" \
            -var="site_name=${CE_SITE_NAME}" \
            -var="vpc_cidr=${VPC_CIDR_CE}" \
            -var="create_module2_foundations=true" \
            -var="xc_api_url=${{ secrets.XC_API_URL }}" \
            -var="xc_api_p12_file=$RUNNER_TEMP/xc-api-creds.p12" \
            -var="kubeconfig_path=$RUNNER_TEMP/module-2-vk8s-kubeconfig.yaml"

      - name: Wait for XC CE site readiness
        shell: bash
        run: |
          set -euo pipefail
          api_url='${{ secrets.XC_API_URL }}'
          api_root="${api_url%/}"
          api_root="${api_root%/api}"
          site_name='${{ vars.CE_SITE_NAME }}'
          site_endpoint="${api_root}/api/config/namespaces/system/sites/${site_name}"
          attempts=120
          sleep_seconds=30
          response_file="$RUNNER_TEMP/module-2-ce-site-status.json"

          for attempt in $(seq 1 "$attempts"); do
            http_code="$(curl \
              --silent \
              --show-error \
              --output "$response_file" \
              --write-out '%{http_code}' \
              --cert "$RUNNER_TEMP/xc-api-cert.pem" \
              --key "$RUNNER_TEMP/xc-api-key.pem" \
              "$site_endpoint" || true)"

            if [[ "$http_code" == "200" ]]; then
              site_state="$(jq -r '[.spec?.site_state, .replace_form?.spec?.site_state, .site_state, .status[]?.site_state] | map(select(. != null and . != "")) | first // ""' "$response_file")"
              case "$site_state" in
                ONLINE|ORCHESTRATION_COMPLETE|VALIDATION_SUCCESS)
                  exit 0
                  ;;
                FAILED|FAILED_INACTIVE|ERROR_IN_ORCHESTRATION|VALIDATION_FAILED|ERROR_DELETING_CLOUD_RESOURCES|ERROR_UPDATING_CLOUD_RESOURCES)
                  echo "::error::XC CE site entered a terminal state: ${site_state}."
                  cat "$response_file"
                  exit 1
                  ;;
              esac
            fi

            if [[ "$attempt" -lt "$attempts" ]]; then
              echo "XC CE site not ready yet (attempt ${attempt}/${attempts}); waiting ${sleep_seconds}s"
              sleep "$sleep_seconds"
            fi
          done

          echo "::error::Timed out waiting for the XC CE site to become ready during module-2."
          if [[ -s "$response_file" ]]; then
            cat "$response_file"
          fi
          exit 1

      - name: Wait for vK8s API readiness
        shell: bash
        run: |
          set -euo pipefail
          kubeconfig_path="$RUNNER_TEMP/module-2-vk8s-kubeconfig.yaml"
          if [[ ! -s "$kubeconfig_path" ]]; then
            echo "::error::The module-2 vK8s kubeconfig was not generated."
            exit 1
          fi

          attempts=80
          sleep_seconds=15
          cluster_info_log="$RUNNER_TEMP/module-2-vk8s-cluster-info.log"
          namespace_probe_log="$RUNNER_TEMP/module-2-vk8s-namespace.log"

          for attempt in $(seq 1 "$attempts"); do
            if kubectl --kubeconfig "$kubeconfig_path" --request-timeout=10s cluster-info >"$cluster_info_log" 2>&1 && \
              kubectl --kubeconfig "$kubeconfig_path" --request-timeout=10s get namespace "${MODULE2_ENVIRONMENT}" -o name >"$namespace_probe_log" 2>&1; then
              cat "$cluster_info_log"
              cat "$namespace_probe_log"
              exit 0
            fi

            echo "vK8s API not ready yet (attempt ${attempt}/${attempts}); waiting ${sleep_seconds}s"
            sleep "$sleep_seconds"
          done

          echo "::error::Timed out waiting for the module-2 vK8s API to become ready."
          exit 1

      - name: Terraform init module 2
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/module-2.backend.hcl" <<EOF
          organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
          workspaces {
            name = "${MODULE2_WORKSPACE}"
          }
          EOF
          terraform -chdir=aws-mk8s-vk8s/module-2 init \
            -backend-config="$RUNNER_TEMP/module-2.backend.hcl"

      - name: Detect existing module 2 network resources
        shell: bash
        run: |
          set -euo pipefail
          api_url='${{ secrets.XC_API_URL }}'
          api_root="${api_url%/}"
          api_root="${api_root%/api}"

          declare -a checks=(
            "origin_pools:inventory-server-branches-pool:TF_VAR_create_origin_pool:module-2-origin-pool.json"
            "tcp_loadbalancers:inventory-server-branches:TF_VAR_create_tcp_loadbalancer:module-2-tcp-loadbalancer.json"
          )

          for check in "${checks[@]}"; do
            IFS=':' read -r resource_kind resource_name env_name output_file <<< "$check"
            endpoint="${api_root}/api/config/namespaces/${MODULE2_ENVIRONMENT}/${resource_kind}/${resource_name}"
            http_code="$(curl \
              --silent \
              --show-error \
              --output "$RUNNER_TEMP/${output_file}" \
              --write-out '%{http_code}' \
              --cert "$RUNNER_TEMP/xc-api-cert.pem" \
              --key "$RUNNER_TEMP/xc-api-key.pem" \
              "$endpoint" || true)"

            case "$http_code" in
              200)
                echo "${env_name}=false" >> "$GITHUB_ENV"
                echo "${resource_kind%?} ${resource_name} already exists in XC; module-2 will reuse it."
                ;;
              404)
                echo "${env_name}=true" >> "$GITHUB_ENV"
                echo "${resource_kind%?} ${resource_name} does not exist in XC yet; module-2 will create it."
                ;;
              *)
                echo "::error::Unable to determine whether ${resource_kind%?} ${resource_name} exists in XC (HTTP ${http_code:-curl-error})."
                if [[ -s "$RUNNER_TEMP/${output_file}" ]]; then
                  cat "$RUNNER_TEMP/${output_file}"
                fi
                exit 1
                ;;
            esac
          done

      - name: Terraform apply module 2
        shell: bash
        run: |
          set -euo pipefail
          apply_log="$RUNNER_TEMP/module-2-apply.log"
          attempts=4
          sleep_seconds=20

          for attempt in $(seq 1 "$attempts"); do
            if terraform -chdir=aws-mk8s-vk8s/module-2 apply -auto-approve \
              -var="environment=${MODULE2_ENVIRONMENT}" \
              -var="xc_api_url=${{ secrets.XC_API_URL }}" \
              -var="xc_api_p12_file=$RUNNER_TEMP/xc-api-creds.p12" \
              -var="kubeconfig_path=$RUNNER_TEMP/module-2-vk8s-kubeconfig.yaml" \
              -var="create_origin_pool=${TF_VAR_create_origin_pool}" \
              -var="create_tcp_loadbalancer=${TF_VAR_create_tcp_loadbalancer}" \
              -var="app_stack_name=${APP_STACK_NAME}" \
              >"$apply_log" 2>&1
            then
              cat "$apply_log"
              exit 0
            fi

            cat "$apply_log"
            if grep -Fq "Origin pool buytime-online/inventory-server-branches-pool in mirror policy does not exist" "$apply_log" && [[ "$attempt" -lt "$attempts" ]]; then
              echo "XC origin pool propagation delay during module 2 apply (attempt ${attempt}/${attempts}); retrying in ${sleep_seconds}s"
              sleep "$sleep_seconds"
              continue
            fi

            exit 1
          done

      - name: Validate module 2 workloads
        shell: bash
        run: |
          set -euo pipefail
          kubeconfig_path="$RUNNER_TEMP/module-2-vk8s-kubeconfig.yaml"
          kubectl --kubeconfig "$kubeconfig_path" -n "${MODULE2_ENVIRONMENT}" get deployments,svc -o wide
          kubectl --kubeconfig "$kubeconfig_path" -n "${MODULE2_ENVIRONMENT}" rollout status deployment/inventory-server-deployment --timeout=10m
          kubectl --kubeconfig "$kubeconfig_path" -n "${MODULE2_ENVIRONMENT}" get pods -o wide

      - name: Validate module 2 TCP connectivity from branch
        shell: bash
        run: |
          set -euo pipefail
          branch_kubeconfig_path='${{ steps.branch_kubeconfig.outputs.kubeconfig_path }}'
          branch_namespace="${XC_NAMESPACE_OUTPUT}"
          pod_name='module2-sync-check'

          cleanup() {
            kubectl --kubeconfig "$branch_kubeconfig_path" -n "$branch_namespace" delete pod "$pod_name" --ignore-not-found --wait=false >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          kubectl --kubeconfig "$branch_kubeconfig_path" -n "$branch_namespace" delete pod "$pod_name" --ignore-not-found --wait=false >/dev/null 2>&1 || true
          kubectl --kubeconfig "$branch_kubeconfig_path" -n "$branch_namespace" run "$pod_name" \
            --image=busybox:1.36 \
            --restart=Never \
            --labels=app=module2-sync-check \
            --command -- sh -c "sleep 3600"

          kubectl --kubeconfig "$branch_kubeconfig_path" -n "$branch_namespace" wait --for=condition=Ready pod/"$pod_name" --timeout=5m

          kubectl --kubeconfig "$branch_kubeconfig_path" -n "$branch_namespace" exec "$pod_name" -- \
            sh -c "nc -zvw10 ${MODULE2_SYNC_DOMAIN} ${MODULE2_SYNC_PORT}"

      - name: Validate module 2 synchronization plugin
        shell: bash
        run: |
          set -euo pipefail
          branch_kubeconfig_path='${{ steps.branch_kubeconfig.outputs.kubeconfig_path }}'
          branch_namespace="${XC_NAMESPACE_OUTPUT}"
          sync_endpoint="${MODULE2_SYNC_DOMAIN}:${MODULE2_SYNC_PORT}"
          wordpress_pod="$(kubectl --kubeconfig "$branch_kubeconfig_path" -n "$branch_namespace" get pod -l app=wordpress -o jsonpath='{.items[0].metadata.name}')"
          php_script="$RUNNER_TEMP/configure-buytime-synchronization.php"

          if [[ -z "$wordpress_pod" ]]; then
            echo "::error::Unable to locate the wordpress pod to validate the synchronization plugin."
            exit 1
          fi

          cat > "$php_script" <<PHP
          <?php
          require '/var/www/html/wp-load.php';

          if (!class_exists('BuytimeSynchronization')) {
              require_once '/var/www/html/wp-content/plugins/plugin_buytime/buytime-synchronization.php';
          }

          \$endpoint = '${sync_endpoint}';
          if (\$endpoint === '') {
              fwrite(STDERR, "Missing synchronization endpoint.\n");
              exit(1);
          }

          \$options = get_option('synchronization_server');
          if (!is_array(\$options)) {
              \$options = array();
          }

          \$options['synchronization_server_url'] = \$endpoint;
          update_option('synchronization_server', \$options, true);

          \$current = get_option('synchronization_server');
          if (!is_array(\$current) || (\$current['synchronization_server_url'] ?? '') !== \$endpoint) {
              fwrite(STDERR, "Failed to persist the synchronization server URL.\n");
              exit(1);
          }

          \$plugin = new BuytimeSynchronization('buytime_menu');
          if (!\$plugin->check_server_status(\$endpoint)) {
              fwrite(STDERR, "Connection with the Synchronization server failed.\n");
              exit(1);
          }

          fwrite(STDOUT, "Connection with the Synchronization server established.\n");
          PHP

          kubectl --kubeconfig "$branch_kubeconfig_path" -n "$branch_namespace" exec "$wordpress_pod" -- php -v >/dev/null
          kubectl --kubeconfig "$branch_kubeconfig_path" -n "$branch_namespace" exec -i "$wordpress_pod" -- sh -c 'cat > /tmp/configure-buytime-synchronization.php' < "$php_script"
          kubectl --kubeconfig "$branch_kubeconfig_path" -n "$branch_namespace" exec "$wordpress_pod" -- php /tmp/configure-buytime-synchronization.php
          kubectl --kubeconfig "$branch_kubeconfig_path" -n "$branch_namespace" exec "$wordpress_pod" -- rm -f /tmp/configure-buytime-synchronization.php || true

      - name: Write module 2 summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Module 2 Summary"
            echo
            echo "- App Stack site: ${APP_STACK_NAME:-unknown}"
            echo "- CE site name: ${CE_SITE_NAME}"
            echo "- Online namespace: ${MODULE2_ENVIRONMENT}"
            echo "- CE workspace: ${CE_WORKSPACE}"
            echo "- Module 2 workspace: ${MODULE2_WORKSPACE}"
            echo "- Sync domain: ${MODULE2_SYNC_DOMAIN}"
            echo "- Sync port: ${MODULE2_SYNC_PORT}"
            echo "- vK8s kubeconfig generated: $(if [[ -s "$RUNNER_TEMP/module-2-vk8s-kubeconfig.yaml" ]]; then echo yes; else echo no; fi)"
            echo "- Branch to sync TCP validation: executed"
            echo "- WordPress synchronization plugin validation: executed"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Revoke temporary branch kubeconfig credential
        if: always()
        shell: bash
        run: |
          set +e
          terraform -chdir=aws-mk8s-vk8s/kubeconfig destroy -auto-approve \
            -var="project_prefix=${PROJECT_PREFIX}" \
            -var="site_name=${APP_STACK_NAME}" \
            -var="xc_namespace=${XC_NAMESPACE_OUTPUT}" \
            -var="service_credential_role=${{ steps.branch_kubeconfig.outputs.service_credential_role }}" \
            -var="credential_name=${{ steps.branch_kubeconfig.outputs.credential_name }}" \
            -var="xc_api_url=${{ secrets.XC_API_URL }}" \
            -var="xc_api_p12_file=$RUNNER_TEMP/xc-api-creds.p12"

  module_3:
    name: Apply module 3
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: ${{ inputs.deployment_stage == 'module-3' }}
    env:
      VES_P12_PASSWORD: ${{ secrets.XC_P12_PASSWORD }}
      TF_VAR_cloud_credential_name: ${{ vars.CE_SITE_NAME }}
      TF_VAR_create_cloud_credential: "false"
      TF_VAR_manage_site_infrastructure: "false"
      TF_VAR_create_namespace: "false"
      TF_VAR_create_re_virtual_site: "false"
      TF_VAR_create_ce_virtual_site: "false"
      TF_VAR_create_virtual_k8s: "false"
      TF_VAR_virtual_k8s_name: buytime-online-vk8s
      TF_VAR_api_credential_name: m3vk-${{ github.run_id }}-${{ github.run_attempt }}
      TF_VAR_site_name: ${{ vars.CE_SITE_NAME }}
      TF_VAR_vpc_cidr: ${{ vars.VPC_CIDR_CE }}
      TF_VAR_create_module2_foundations: "true"
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_aws_access_key: ${{ secrets.AWS_ACCESS_KEY }}
      TF_VAR_aws_secret_key: ${{ secrets.AWS_SECRET_KEY }}
      TF_VAR_xc_api_url: ${{ secrets.XC_API_URL }}
      TF_VAR_create_origin_pool: "true"
      TF_VAR_create_http_loadbalancer: "true"
      TF_VAR_user_domain: ${{ vars.USER_DOMAIN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Validate workflow configuration
        shell: bash
        run: |
          set -euo pipefail
          for name in AWS_REGION PROJECT_PREFIX XC_NAMESPACE CE_SITE_NAME VPC_CIDR_CE USER_DOMAIN; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required repository variable: ${name}."
              exit 1
            fi
          done
          python3 - <<'PY'
          import ipaddress
          import os
          import sys

          cidr = os.environ["VPC_CIDR_CE"]
          try:
              ipaddress.ip_network(cidr, strict=False)
          except Exception as exc:
              print(f"::error::VPC_CIDR_CE must be a valid CIDR block. Received {cidr!r}: {exc}")
              sys.exit(1)
          PY

      - name: Compute workspace names
        shell: bash
        run: |
          set -euo pipefail
          raw="${PROJECT_PREFIX}-${XC_NAMESPACE}"
          workspace_prefix="$(printf '%s' "$raw" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9-' '-')"
          workspace_prefix="${workspace_prefix#-}"
          workspace_prefix="${workspace_prefix%-}"
          if [[ -z "$workspace_prefix" ]]; then
            workspace_prefix="xcawsedgedemo"
          fi
          echo "PREREQUISITES_WORKSPACE=${workspace_prefix}-prerequisites" >> "$GITHUB_ENV"
          echo "CE_WORKSPACE=${workspace_prefix}-aws-ce-site" >> "$GITHUB_ENV"
          echo "MODULE3_WORKSPACE=${workspace_prefix}-module-3" >> "$GITHUB_ENV"

      - name: Decode XC API credential
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' '${{ secrets.XC_API_P12_FILE }}' | base64 --decode > "$RUNNER_TEMP/xc-api-creds.p12"
          echo "TF_VAR_xc_api_p12_file=$RUNNER_TEMP/xc-api-creds.p12" >> "$GITHUB_ENV"

      - name: Validate XC API client certificate
        shell: bash
        run: |
          set -euo pipefail
          openssl pkcs12 \
            -in "$RUNNER_TEMP/xc-api-creds.p12" \
            -clcerts \
            -legacy \
            -nokeys \
            -passin env:VES_P12_PASSWORD \
            -out "$RUNNER_TEMP/xc-api-cert.pem"
          openssl pkcs12 \
            -in "$RUNNER_TEMP/xc-api-creds.p12" \
            -legacy \
            -nocerts \
            -nodes \
            -passin env:VES_P12_PASSWORD \
            -out "$RUNNER_TEMP/xc-api-key.pem"
          end_date="$(openssl x509 -in "$RUNNER_TEMP/xc-api-cert.pem" -noout -enddate | cut -d= -f2-)"
          if ! openssl x509 -in "$RUNNER_TEMP/xc-api-cert.pem" -checkend 0 -noout; then
            echo "::error::XC API client certificate is expired. notAfter=${end_date}. Rotate the certificate in F5 XC and update secrets XC_API_P12_FILE and XC_P12_PASSWORD."
            exit 1
          fi

      - name: Restore prerequisites outputs
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/module-3-prerequisites.backend.hcl" <<EOF
          organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
          workspaces {
            name = "${PREREQUISITES_WORKSPACE}"
          }
          EOF
          terraform -chdir=aws-mk8s-vk8s/prerequisites init \
            -backend-config="$RUNNER_TEMP/module-3-prerequisites.backend.hcl"

          app_stack_name="$(terraform -chdir=aws-mk8s-vk8s/prerequisites output -raw app_stack_name 2>/dev/null || true)"
          xc_namespace="$(terraform -chdir=aws-mk8s-vk8s/prerequisites output -raw xc_namespace 2>/dev/null || true)"

          if [[ -z "$app_stack_name" || -z "$xc_namespace" ]]; then
            echo "::error::Unable to read prerequisite outputs from workspace ${PREREQUISITES_WORKSPACE}. Run stage module-1 successfully before module-3."
            exit 1
          fi

          echo "APP_STACK_NAME=${app_stack_name}" >> "$GITHUB_ENV"
          echo "XC_NAMESPACE_OUTPUT=${xc_namespace}" >> "$GITHUB_ENV"

      - name: Terraform init branch kubeconfig helper
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=aws-mk8s-vk8s/kubeconfig init

      - name: Generate branch site kubeconfig
        id: branch_kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          prefix_part="$(printf '%s' "$PROJECT_PREFIX" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9-' '-' | cut -c1-12)"
          prefix_part="${prefix_part#-}"
          prefix_part="${prefix_part%-}"
          if [[ -z "$prefix_part" ]]; then
            prefix_part="xcaws"
          fi
          run_suffix="${GITHUB_RUN_ID:(-8)}"
          credential_name="${prefix_part}-${run_suffix}-m3cfg"
          credential_name="${credential_name#-}"
          credential_name="${credential_name%-}"

          candidates=()
          if [[ -n "${XC_SERVICE_CREDENTIAL_ROLE:-}" ]]; then
            candidates+=("$XC_SERVICE_CREDENTIAL_ROLE")
          fi
          candidates+=("ves-io-admin-role" "Admin" "admin" "Standard" "standard" "ves-io-admin")

          selected_role=""
          for role in "${candidates[@]}"; do
            [[ -z "$role" ]] && continue
            if [[ " ${tried_roles:-} " == *" $role "* ]]; then
              continue
            fi
            tried_roles="${tried_roles:-} $role"

            apply_log="$RUNNER_TEMP/module-3-branch-kubeconfig-${role}.log"
            if terraform -chdir=aws-mk8s-vk8s/kubeconfig apply -auto-approve \
              -var="project_prefix=${PROJECT_PREFIX}" \
              -var="site_name=${APP_STACK_NAME}" \
              -var="xc_namespace=${XC_NAMESPACE_OUTPUT}" \
              -var="service_credential_role=${role}" \
              -var="credential_name=${credential_name}" \
              -var="xc_api_url=${{ secrets.XC_API_URL }}" \
              -var="xc_api_p12_file=$RUNNER_TEMP/xc-api-creds.p12" \
              >"$apply_log" 2>&1
            then
              selected_role="$role"
              break
            fi

            if ! grep -q "role '.*' is not found or it is disabled" "$apply_log"; then
              cat "$apply_log"
              exit 1
            fi
          done

          if [[ -z "$selected_role" ]]; then
            echo "::error::Unable to create the branch site kubeconfig credential with any known role. Set repository variable XC_SERVICE_CREDENTIAL_ROLE to a valid role for this tenant."
            exit 1
          fi

          terraform -chdir=aws-mk8s-vk8s/kubeconfig output -raw kubeconfig_content > "$RUNNER_TEMP/module-3-branch-kubeconfig.yaml"
          echo "credential_name=${credential_name}" >> "$GITHUB_OUTPUT"
          echo "kubeconfig_path=$RUNNER_TEMP/module-3-branch-kubeconfig.yaml" >> "$GITHUB_OUTPUT"
          echo "service_credential_role=${selected_role}" >> "$GITHUB_OUTPUT"

      - name: Terraform init CE foundations
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/module-3-ce.backend.hcl" <<EOF
          organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
          workspaces {
            name = "${CE_WORKSPACE}"
          }
          EOF
          terraform -chdir=aws-mk8s-vk8s/aws-ce-site init \
            -backend-config="$RUNNER_TEMP/module-3-ce.backend.hcl"

      - name: Validate module 2 foundations exist
        shell: bash
        run: |
          set -euo pipefail
          api_url='${{ secrets.XC_API_URL }}'
          api_root="${api_url%/}"
          api_root="${api_root%/api}"

          declare -a checks=(
            "namespace|${api_root}/api/web/namespaces/${MODULE3_ENVIRONMENT}|module-3-namespace.json"
            "ce-vsite|${api_root}/api/config/namespaces/${MODULE3_ENVIRONMENT}/virtual_sites/buytime-ce-sites|module-3-ce-vsite.json"
            "re-vsite|${api_root}/api/config/namespaces/${MODULE3_ENVIRONMENT}/virtual_sites/buytime-re-sites|module-3-re-vsite.json"
            "vk8s|${api_root}/api/config/namespaces/${MODULE3_ENVIRONMENT}/virtual_k8ss/buytime-online-vk8s|module-3-vk8s.json"
          )

          for check in "${checks[@]}"; do
            IFS='|' read -r resource_label endpoint output_file <<< "$check"
            http_code="$(curl \
              --silent \
              --show-error \
              --output "$RUNNER_TEMP/${output_file}" \
              --write-out '%{http_code}' \
              --cert "$RUNNER_TEMP/xc-api-cert.pem" \
              --key "$RUNNER_TEMP/xc-api-key.pem" \
              "$endpoint" || true)"
            if [[ "$http_code" != "200" ]]; then
              echo "::error::Module 2 foundation ${resource_label} is missing or unreadable in XC (HTTP ${http_code:-curl-error}). Run module-2 successfully before module-3."
              if [[ -s "$RUNNER_TEMP/${output_file}" ]]; then
                cat "$RUNNER_TEMP/${output_file}"
              fi
              exit 1
            fi
          done

      - name: Generate module 3 vK8s kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=aws-mk8s-vk8s/aws-ce-site apply -auto-approve \
            -var="cloud_credential_name=${CE_SITE_NAME}" \
            -var="create_cloud_credential=false" \
            -var="create_namespace=false" \
            -var="create_re_virtual_site=false" \
            -var="create_ce_virtual_site=false" \
            -var="create_virtual_k8s=false" \
            -var="manage_site_infrastructure=false" \
            -var="virtual_k8s_name=buytime-online-vk8s" \
            -var="api_credential_name=${TF_VAR_api_credential_name}" \
            -var="environment=${MODULE3_ENVIRONMENT}" \
            -var="site_name=${CE_SITE_NAME}" \
            -var="vpc_cidr=${VPC_CIDR_CE}" \
            -var="create_module2_foundations=true" \
            -var="xc_api_url=${{ secrets.XC_API_URL }}" \
            -var="xc_api_p12_file=$RUNNER_TEMP/xc-api-creds.p12" \
            -var="kubeconfig_path=$RUNNER_TEMP/module-3-vk8s-kubeconfig.yaml"

      - name: Wait for XC CE site readiness
        shell: bash
        run: |
          set -euo pipefail
          api_url='${{ secrets.XC_API_URL }}'
          api_root="${api_url%/}"
          api_root="${api_root%/api}"
          site_name='${{ vars.CE_SITE_NAME }}'
          site_endpoint="${api_root}/api/config/namespaces/system/sites/${site_name}"
          attempts=120
          sleep_seconds=30
          response_file="$RUNNER_TEMP/module-3-ce-site-status.json"

          for attempt in $(seq 1 "$attempts"); do
            http_code="$(curl \
              --silent \
              --show-error \
              --output "$response_file" \
              --write-out '%{http_code}' \
              --cert "$RUNNER_TEMP/xc-api-cert.pem" \
              --key "$RUNNER_TEMP/xc-api-key.pem" \
              "$site_endpoint" || true)"

            if [[ "$http_code" == "200" ]]; then
              site_state="$(jq -r '[.spec?.site_state, .replace_form?.spec?.site_state, .site_state, .status[]?.site_state] | map(select(. != null and . != "")) | first // ""' "$response_file")"
              case "$site_state" in
                ONLINE|ORCHESTRATION_COMPLETE|VALIDATION_SUCCESS)
                  exit 0
                  ;;
                FAILED|FAILED_INACTIVE|ERROR_IN_ORCHESTRATION|VALIDATION_FAILED|ERROR_DELETING_CLOUD_RESOURCES|ERROR_UPDATING_CLOUD_RESOURCES)
                  echo "::error::XC CE site entered a terminal state: ${site_state}."
                  cat "$response_file"
                  exit 1
                  ;;
              esac
            fi

            if [[ "$attempt" -lt "$attempts" ]]; then
              echo "XC CE site not ready yet (attempt ${attempt}/${attempts}); waiting ${sleep_seconds}s"
              sleep "$sleep_seconds"
            fi
          done

          echo "::error::Timed out waiting for the XC CE site to become ready during module-3."
          if [[ -s "$response_file" ]]; then
            cat "$response_file"
          fi
          exit 1

      - name: Wait for vK8s API readiness
        shell: bash
        run: |
          set -euo pipefail
          kubeconfig_path="$RUNNER_TEMP/module-3-vk8s-kubeconfig.yaml"
          if [[ ! -s "$kubeconfig_path" ]]; then
            echo "::error::The module-3 vK8s kubeconfig was not generated."
            exit 1
          fi

          attempts=80
          sleep_seconds=15
          cluster_info_log="$RUNNER_TEMP/module-3-vk8s-cluster-info.log"
          namespace_probe_log="$RUNNER_TEMP/module-3-vk8s-namespace.log"

          for attempt in $(seq 1 "$attempts"); do
            if kubectl --kubeconfig "$kubeconfig_path" --request-timeout=10s cluster-info >"$cluster_info_log" 2>&1 && \
              kubectl --kubeconfig "$kubeconfig_path" --request-timeout=10s get namespace "${MODULE3_ENVIRONMENT}" -o name >"$namespace_probe_log" 2>&1; then
              cat "$cluster_info_log"
              cat "$namespace_probe_log"
              exit 0
            fi

            echo "vK8s API not ready yet (attempt ${attempt}/${attempts}); waiting ${sleep_seconds}s"
            sleep "$sleep_seconds"
          done

          echo "::error::Timed out waiting for the module-3 vK8s API to become ready."
          exit 1

      - name: Terraform init module 3
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/module-3.backend.hcl" <<EOF
          organization = "${{ secrets.TF_CLOUD_ORGANIZATION }}"
          workspaces {
            name = "${MODULE3_WORKSPACE}"
          }
          EOF
          terraform -chdir=aws-mk8s-vk8s/module-3 init \
            -backend-config="$RUNNER_TEMP/module-3.backend.hcl"

      - name: Detect existing module 3 network resources
        shell: bash
        run: |
          set -euo pipefail
          api_url='${{ secrets.XC_API_URL }}'
          api_root="${api_url%/}"
          api_root="${api_root%/api}"

          declare -a checks=(
            "origin_pools:${MODULE3_ENVIRONMENT}-deals-pool:TF_VAR_create_origin_pool:module-3-origin-pool.json"
            "http_loadbalancers:${MODULE3_ENVIRONMENT}-deals-server:TF_VAR_create_http_loadbalancer:module-3-http-loadbalancer.json"
          )

          for check in "${checks[@]}"; do
            IFS=':' read -r resource_kind resource_name env_name output_file <<< "$check"
            endpoint="${api_root}/api/config/namespaces/${MODULE3_ENVIRONMENT}/${resource_kind}/${resource_name}"
            http_code="$(curl \
              --silent \
              --show-error \
              --output "$RUNNER_TEMP/${output_file}" \
              --write-out '%{http_code}' \
              --cert "$RUNNER_TEMP/xc-api-cert.pem" \
              --key "$RUNNER_TEMP/xc-api-key.pem" \
              "$endpoint" || true)"

            case "$http_code" in
              200)
                echo "${env_name}=false" >> "$GITHUB_ENV"
                echo "${resource_kind%?} ${resource_name} already exists in XC; module-3 will reuse it."
                ;;
              404)
                echo "${env_name}=true" >> "$GITHUB_ENV"
                echo "${resource_kind%?} ${resource_name} does not exist in XC yet; module-3 will create it."
                ;;
              *)
                echo "::error::Unable to determine whether ${resource_kind%?} ${resource_name} exists in XC (HTTP ${http_code:-curl-error})."
                if [[ -s "$RUNNER_TEMP/${output_file}" ]]; then
                  cat "$RUNNER_TEMP/${output_file}"
                fi
                exit 1
                ;;
            esac
          done

      - name: Terraform apply module 3
        shell: bash
        run: |
          set -euo pipefail
          terraform -chdir=aws-mk8s-vk8s/module-3 apply -auto-approve \
            -var="environment=${MODULE3_ENVIRONMENT}" \
            -var="xc_api_url=${{ secrets.XC_API_URL }}" \
            -var="xc_api_p12_file=$RUNNER_TEMP/xc-api-creds.p12" \
            -var="kubeconfig_path=$RUNNER_TEMP/module-3-vk8s-kubeconfig.yaml" \
            -var="create_origin_pool=${TF_VAR_create_origin_pool}" \
            -var="create_http_loadbalancer=${TF_VAR_create_http_loadbalancer}" \
            -var="user_domain=${USER_DOMAIN}"

      - name: Validate module 3 workloads
        shell: bash
        run: |
          set -euo pipefail
          kubeconfig_path="$RUNNER_TEMP/module-3-vk8s-kubeconfig.yaml"
          kubectl --kubeconfig "$kubeconfig_path" -n "${MODULE3_ENVIRONMENT}" get deployments,svc -o wide
          kubectl --kubeconfig "$kubeconfig_path" -n "${MODULE3_ENVIRONMENT}" rollout status deployment/deals-server-deployment --timeout=10m
          kubectl --kubeconfig "$kubeconfig_path" -n "${MODULE3_ENVIRONMENT}" get pods -o wide

      - name: Validate module 3 deals endpoint from branch
        shell: bash
        run: |
          set -euo pipefail
          branch_kubeconfig_path='${{ steps.branch_kubeconfig.outputs.kubeconfig_path }}'
          branch_namespace="${XC_NAMESPACE_OUTPUT}"
          wordpress_pod="$(kubectl --kubeconfig "$branch_kubeconfig_path" -n "$branch_namespace" get pod -l app=wordpress -o jsonpath='{.items[0].metadata.name}')"

          if [[ -z "$wordpress_pod" ]]; then
            echo "::error::Unable to locate the wordpress pod to validate the public deals endpoint from the branch namespace."
            exit 1
          fi

          attempts=80
          sleep_seconds=15
          response_file="$RUNNER_TEMP/module-3-deals-health-response.txt"
          for attempt in $(seq 1 "$attempts"); do
            response="$(kubectl --kubeconfig "$branch_kubeconfig_path" -n "$branch_namespace" exec "$wordpress_pod" -- \
              sh -c "curl -fsSL --connect-timeout 10 --max-time 20 http://${MODULE3_DEALS_DOMAIN}/health" 2>/dev/null || true)"
            printf '%s\n' "$response" > "$response_file"
            if [[ "$response" == *timestamp* ]]; then
              echo "$response"
              exit 0
            fi

            if [[ "$attempt" -lt "$attempts" ]]; then
              echo "Module 3 deals endpoint not ready yet (attempt ${attempt}/${attempts}); waiting ${sleep_seconds}s"
              sleep "$sleep_seconds"
            fi
          done

          echo "::error::Timed out waiting for the Module 3 deals endpoint to answer /health with a timestamp payload."
          if [[ -s "$response_file" ]]; then
            echo "Last response body:"
            cat "$response_file"
          fi
          echo "DNS probe from wordpress pod:"
          kubectl --kubeconfig "$branch_kubeconfig_path" -n "$branch_namespace" exec "$wordpress_pod" -- \
            sh -c "nslookup ${MODULE3_DEALS_DOMAIN} || getent hosts ${MODULE3_DEALS_DOMAIN} || true" 2>/dev/null || true
          echo "HTTP GET probe from wordpress pod:"
          kubectl --kubeconfig "$branch_kubeconfig_path" -n "$branch_namespace" exec "$wordpress_pod" -- \
            sh -c "curl -sv --connect-timeout 10 --max-time 20 http://${MODULE3_DEALS_DOMAIN}/health || true" 2>&1 || true
          exit 1

      - name: Validate module 3 lightning deals plugin
        shell: bash
        run: |
          set -euo pipefail
          branch_kubeconfig_path='${{ steps.branch_kubeconfig.outputs.kubeconfig_path }}'
          branch_namespace="${XC_NAMESPACE_OUTPUT}"
          deals_endpoint="${MODULE3_DEALS_DOMAIN}"
          wordpress_pod="$(kubectl --kubeconfig "$branch_kubeconfig_path" -n "$branch_namespace" get pod -l app=wordpress -o jsonpath='{.items[0].metadata.name}')"
          php_script="$RUNNER_TEMP/configure-buytime-lightning-deals.php"

          if [[ -z "$wordpress_pod" ]]; then
            echo "::error::Unable to locate the wordpress pod to validate the lightning deals plugin."
            exit 1
          fi

          cat > "$php_script" <<PHP
          <?php
          require '/var/www/html/wp-load.php';

          if (!class_exists('BuytimeLightningDeals')) {
              require_once '/var/www/html/wp-content/plugins/plugin_buytime/buytime-lightning-deals.php';
          }

          \$endpoint = '${MODULE3_DEALS_DOMAIN}';
          if (\$endpoint === '') {
              fwrite(STDERR, "Missing lightning deals endpoint.\n");
              exit(1);
          }

          \$options = get_option('deals_server');
          if (!is_array(\$options)) {
              \$options = array();
          }

          \$options['deals_server_url'] = \$endpoint;
          update_option('deals_server', \$options, true);

          \$current = get_option('deals_server');
          if (!is_array(\$current) || (\$current['deals_server_url'] ?? '') !== \$endpoint) {
              fwrite(STDERR, "Failed to persist the lightning deals server URL.\n");
              exit(1);
          }

          \$plugin = new BuytimeLightningDeals('buytime_menu');
          if (!\$plugin->check_server_status(\$endpoint)) {
              fwrite(STDERR, "Connection with the Lightning Deals server failed.\n");
              exit(1);
          }

          fwrite(STDOUT, "Connection with the Lightning Deals server established.\n");
          PHP

          kubectl --kubeconfig "$branch_kubeconfig_path" -n "$branch_namespace" exec "$wordpress_pod" -- php -v >/dev/null
          kubectl --kubeconfig "$branch_kubeconfig_path" -n "$branch_namespace" exec -i "$wordpress_pod" -- sh -c 'cat > /tmp/configure-buytime-lightning-deals.php' < "$php_script"
          kubectl --kubeconfig "$branch_kubeconfig_path" -n "$branch_namespace" exec "$wordpress_pod" -- php /tmp/configure-buytime-lightning-deals.php
          kubectl --kubeconfig "$branch_kubeconfig_path" -n "$branch_namespace" exec "$wordpress_pod" -- rm -f /tmp/configure-buytime-lightning-deals.php || true

      - name: Write module 3 summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Module 3 Summary"
            echo
            echo "- App Stack site: ${APP_STACK_NAME:-unknown}"
            echo "- CE site name: ${CE_SITE_NAME}"
            echo "- Online namespace: ${MODULE3_ENVIRONMENT}"
            echo "- CE workspace: ${CE_WORKSPACE}"
            echo "- Module 3 workspace: ${MODULE3_WORKSPACE}"
            echo "- Deals domain: ${MODULE3_DEALS_DOMAIN}"
            echo "- vK8s kubeconfig generated: $(if [[ -s "$RUNNER_TEMP/module-3-vk8s-kubeconfig.yaml" ]]; then echo yes; else echo no; fi)"
            echo "- Deals health validation from branch: executed"
            echo "- WordPress lightning deals plugin validation: executed"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Revoke temporary branch kubeconfig credential
        if: always()
        shell: bash
        run: |
          set +e
          terraform -chdir=aws-mk8s-vk8s/kubeconfig destroy -auto-approve \
            -var="project_prefix=${PROJECT_PREFIX}" \
            -var="site_name=${APP_STACK_NAME}" \
            -var="xc_namespace=${XC_NAMESPACE_OUTPUT}" \
            -var="service_credential_role=${{ steps.branch_kubeconfig.outputs.service_credential_role }}" \
            -var="credential_name=${{ steps.branch_kubeconfig.outputs.credential_name }}" \
            -var="xc_api_url=${{ secrets.XC_API_URL }}" \
            -var="xc_api_p12_file=$RUNNER_TEMP/xc-api-creds.p12"

